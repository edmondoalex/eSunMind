name: e-SunMind
slug: e_sunmind
description: "Dati sole/luna con ricerca localita, UI web e publish entita in e-Control"
version: "0.3.163"
arch: [amd64, aarch64, armhf, armv7, i386]
init: false
startup: services
boot: auto
host_network: true
homeassistant_api: true
hassio_api: true
panel_icon: mdi:white-balance-sunny
panel_title: e-SunMind
ingress: true
ingress_port: 1980
ports:
  1980/tcp: 1980
ports_description:
  1980/tcp: "Web UI (ingress/proxy)"
