<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunsynk Wrapper Standalone (Hass Mock)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" />
  <style>
    :root {
      --addon-bg: #080a10;
      --primary-background-color: #080a10;
      --card-background-color: #0f172a;
      --primary-text-color: #e2e8f0;
      --secondary-text-color: #94a3b8;
    }
    html, body { margin: 0; background: var(--addon-bg); color: var(--primary-text-color); font-family: Inter, Segoe UI, sans-serif; }
    .page { min-height: 100vh; display: grid; place-items: center; padding: 12px; }
    .host { width: min(1200px, 98vw); }
    .bar { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; font-size: 13px; color: var(--secondary-text-color); }
    button { background: #111827; color: var(--primary-text-color); border: 1px solid #334155; border-radius: 8px; padding: 6px 10px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="page">
    <div class="host">
      <div class="bar">
        <button id="btn-random">Random (fallback)</button>
        <span id="status">Wrapper attivo</span>
      </div>
      <sunsynk-power-flow-card id="card"></sunsynk-power-flow-card>
    </div>
  </div>

  <script type="module" src="https://cdn.jsdelivr.net/gh/slipx06/sunsynk-power-flow-card@master/dist/sunsynk-power-flow-card.js"></script>
  <script>
    // Hass Mock globale
    window.hass = {
      language: 'it',
      selectedLanguage: 'it',
      locale: { language: 'it-IT', number_format: 'decimal_comma' },
      themes: { dark: true, default_theme: 'default', themes: {} },
      states: {},
      localize: (key) => String(key || ''),
      callService: () => Promise.resolve(),
      formatEntityState: (s) => String(s?.state ?? ''),
      formatEntityAttributeValue: (_s, _a, v) => String(v ?? ''),
    };

    function mkState(state, unit = '', extra = {}) {
      return {
        entity_id: extra.entity_id || '',
        state: String(state),
        attributes: {
          unit_of_measurement: unit,
          device_class: extra.device_class || '',
          state_class: extra.state_class || '',
        },
        last_changed: new Date().toISOString(),
        last_updated: new Date().toISOString(),
      };
    }

    const sensorIds = {
      inverter_power_175: 'sensor.mock_inverter_power',
      grid_power_169: 'sensor.mock_grid_power',
      battery_soc_184: 'sensor.mock_battery_soc',
      battery_power_190: 'sensor.mock_battery_power',
      battery_current_191: 'sensor.mock_battery_current',
      battery_voltage_183: 'sensor.mock_battery_voltage',
      grid_ct_power_172: 'sensor.mock_grid_ct_power',
      grid_connected_status_194: 'binary_sensor.mock_grid_connected',
      inverter_status_59: 'sensor.mock_inverter_status',
      inverter_voltage_154: 'sensor.mock_inverter_voltage',
      inverter_current_164: 'sensor.mock_inverter_current',
      load_frequency_192: 'sensor.mock_load_frequency',
      pv1_power_186: 'sensor.mock_pv1_power',
      pv2_power_187: 'sensor.mock_pv2_power',
      pv1_voltage_109: 'sensor.mock_pv1_voltage',
      pv1_current_110: 'sensor.mock_pv1_current',
      pv2_voltage_111: 'sensor.mock_pv2_voltage',
      pv2_current_112: 'sensor.mock_pv2_current',
      day_pv_energy_108: 'sensor.mock_day_pv_energy',
      day_battery_charge_70: 'sensor.mock_day_battery_charge',
      day_battery_discharge_71: 'sensor.mock_day_battery_discharge',
      day_load_energy_84: 'sensor.mock_day_load_energy',
      day_grid_import_76: 'sensor.mock_day_grid_import',
      day_grid_export_77: 'sensor.mock_day_grid_export',
    };

    let cardConfig = {
      type: 'custom:sunsynk-power-flow-card',
      cardstyle: 'full',
      show_solar: true,
      show_battery: true,
      show_grid: true,
      dynamic_line_width: true,
      min_line_width: 1,
      max_line_width: 4,
      wide: false,
      inverter: { modern: true, auto_scale: true, three_phase: false },
      solar: { mppts: 2, show_daily: true, animation_speed: 6, max_power: 7000 },
      battery: { energy: 15960, shutdown_soc: 20, show_daily: true, animation_speed: 8, max_power: 5000, auto_scale: true },
      load: { show_daily: true, show_aux: false, animation_speed: 6, max_power: 9000, auto_scale: true },
      grid: { show_daily_buy: true, animation_speed: 9, max_power: 8000, auto_scale: true },
      entities: { ...sensorIds },
    };
    const signFix = { pv: 1, home: 1, grid: 1, battery: 1 };

    function deepMerge(target, src) {
      if (!src || typeof src !== 'object') return target;
      for (const [k, v] of Object.entries(src)) {
        if (v && typeof v === 'object' && !Array.isArray(v)) {
          if (!target[k] || typeof target[k] !== 'object' || Array.isArray(target[k])) target[k] = {};
          deepMerge(target[k], v);
        } else {
          target[k] = v;
        }
      }
      return target;
    }

    function applyEnergyEntityFallbacks(e) {
      cardConfig.entities = cardConfig.entities || {};
      // Default fallback: single-PV topology unless PV2 is explicitly provided by card JSON.
      cardConfig.entities.pv2_power_187 = '';
      cardConfig.entities.pv2_voltage_111 = '';
      cardConfig.entities.pv2_current_112 = '';
      if (e?.home_power_entity_id) cardConfig.entities.inverter_power_175 = String(e.home_power_entity_id);
      if (e?.grid_power_entity_id) {
        cardConfig.entities.grid_power_169 = String(e.grid_power_entity_id);
        cardConfig.entities.grid_ct_power_172 = String(e.grid_power_entity_id);
      }
      if (e?.battery_soc_entity_id) cardConfig.entities.battery_soc_184 = String(e.battery_soc_entity_id);
      if (e?.battery_power_entity_id) cardConfig.entities.battery_power_190 = String(e.battery_power_entity_id);
      if (e?.pv_power_entity_id) cardConfig.entities.pv1_power_186 = String(e.pv_power_entity_id);
      if (e?.pv_energy_today_entity_id) cardConfig.entities.day_pv_energy_108 = String(e.pv_energy_today_entity_id);
      if (e?.home_energy_today_entity_id) cardConfig.entities.day_load_energy_84 = String(e.home_energy_today_entity_id);
      if (e?.grid_import_today_entity_id) cardConfig.entities.day_grid_import_76 = String(e.grid_import_today_entity_id);
      if (e?.grid_export_today_entity_id) cardConfig.entities.day_grid_export_77 = String(e.grid_export_today_entity_id);
    }

    function enforceTopologyFromConfig() {
      cardConfig.solar = cardConfig.solar || {};
      cardConfig.entities = cardConfig.entities || {};
      const explicitMppts = Number(cardConfig.solar.mppts);
      let mppts = Number.isFinite(explicitMppts) ? explicitMppts : NaN;
      if (!Number.isFinite(mppts)) {
        const hasPv2 = Boolean(String(cardConfig.entities.pv2_power_187 || '').trim());
        mppts = hasPv2 ? 2 : 1;
      }
      cardConfig.solar.mppts = Math.max(1, Math.min(6, Math.round(mppts)));
      if (cardConfig.solar.mppts === 1) {
        cardConfig.entities.pv2_power_187 = '';
        cardConfig.entities.pv2_voltage_111 = '';
        cardConfig.entities.pv2_current_112 = '';
      }
    }

    async function loadCardConfigFromAddonOptions() {
      try {
        const r = await fetch('../api/options', { cache: 'no-store' });
        if (!r.ok) return;
        const j = await r.json();
        const e = j?.energy || {};
        signFix.pv = String(e?.pv_power_sign || 'positive') === 'negative' ? -1 : 1;
        signFix.home = String(e?.home_power_sign || 'positive') === 'negative' ? -1 : 1;
        signFix.grid = String(e?.grid_power_sign || (e?.invert_grid_sign ? 'negative' : 'positive')) === 'negative' ? -1 : 1;
        signFix.battery = String(e?.battery_power_sign || (e?.invert_battery_sign ? 'negative' : 'positive')) === 'negative' ? -1 : 1;
        applyEnergyEntityFallbacks(e);
        const raw = j?.energy?.sunsynk_card_config_json;
        if (raw) {
          const parsed = JSON.parse(String(raw));
          if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
            cardConfig = deepMerge(cardConfig, parsed);
          }
        }
        enforceTopologyFromConfig();
        document.getElementById('status').textContent = `Config card caricata (MPPT: ${cardConfig?.solar?.mppts || '?'})`;
      } catch (_) {
        enforceTopologyFromConfig();
        document.getElementById('status').textContent = 'Config card parziale: fallback applicato';
      }
    }

    function seedStates() {
      const s = window.hass.states;
      s[sensorIds.inverter_power_175] = mkState(1160, 'W', { device_class: 'power', state_class: 'measurement' });
      s[sensorIds.grid_power_169] = mkState(1150, 'W', { device_class: 'power', state_class: 'measurement' });
      s[sensorIds.battery_soc_184] = mkState(26, '%', { device_class: 'battery', state_class: 'measurement' });
      s[sensorIds.battery_power_190] = mkState(-3040, 'W', { device_class: 'power', state_class: 'measurement' });
      s[sensorIds.battery_current_191] = mkState(18.3, 'A', { device_class: 'current', state_class: 'measurement' });
      s[sensorIds.battery_voltage_183] = mkState(52.9, 'V', { device_class: 'voltage', state_class: 'measurement' });
      s[sensorIds.grid_ct_power_172] = mkState(1150, 'W', { device_class: 'power', state_class: 'measurement' });
      s[sensorIds.grid_connected_status_194] = mkState('on');
      s[sensorIds.inverter_status_59] = mkState('normal');
      s[sensorIds.inverter_voltage_154] = mkState(231.5, 'V', { device_class: 'voltage', state_class: 'measurement' });
      s[sensorIds.inverter_current_164] = mkState(5.0, 'A', { device_class: 'current', state_class: 'measurement' });
      s[sensorIds.load_frequency_192] = mkState(50.02, 'Hz', { device_class: 'frequency', state_class: 'measurement' });
      s[sensorIds.pv1_power_186] = mkState(2950, 'W', { device_class: 'power', state_class: 'measurement' });
      s[sensorIds.pv2_power_187] = mkState(2420, 'W', { device_class: 'power', state_class: 'measurement' });
      s[sensorIds.pv1_voltage_109] = mkState(370, 'V', { device_class: 'voltage', state_class: 'measurement' });
      s[sensorIds.pv1_current_110] = mkState(8.0, 'A', { device_class: 'current', state_class: 'measurement' });
      s[sensorIds.pv2_voltage_111] = mkState(365, 'V', { device_class: 'voltage', state_class: 'measurement' });
      s[sensorIds.pv2_current_112] = mkState(6.6, 'A', { device_class: 'current', state_class: 'measurement' });
      s[sensorIds.day_pv_energy_108] = mkState(6.7, 'kWh', { device_class: 'energy', state_class: 'total_increasing' });
      s[sensorIds.day_battery_charge_70] = mkState(3.1, 'kWh', { device_class: 'energy', state_class: 'total_increasing' });
      s[sensorIds.day_battery_discharge_71] = mkState(0.0, 'kWh', { device_class: 'energy', state_class: 'total_increasing' });
      s[sensorIds.day_load_energy_84] = mkState(11.9, 'kWh', { device_class: 'energy', state_class: 'total_increasing' });
      s[sensorIds.day_grid_import_76] = mkState(8.5, 'kWh', { device_class: 'energy', state_class: 'total_increasing' });
      s[sensorIds.day_grid_export_77] = mkState(0.2, 'kWh', { device_class: 'energy', state_class: 'total_increasing' });
    }

    const card = document.getElementById('card');

    function forceRender() {
      // nuovo riferimento per trigger update lit
      card.hass = { ...window.hass, states: { ...window.hass.states } };
      if (typeof card.requestUpdate === 'function') card.requestUpdate();
    }

    function initCard() {
      seedStates();
      card.setConfig(cardConfig);
      forceRender();
      document.getElementById('status').textContent = 'Card inizializzata';
    }

    // API pubblica richiesta
    window.updateSensors = function updateSensors(newData = {}) {
      const s = window.hass.states;
      const now = new Date().toISOString();
      const set = (id, value, unit, extra = {}) => {
        const prev = s[id] || mkState(0, unit);
        s[id] = {
          ...prev,
          state: String(value),
          attributes: {
            ...(prev.attributes || {}),
            unit_of_measurement: unit,
            ...(extra.device_class ? { device_class: extra.device_class } : {}),
            ...(extra.state_class ? { state_class: extra.state_class } : {}),
          },
          last_updated: now,
        };
      };

      if (newData.solar_power != null) {
        const mppts = Number(cardConfig?.solar?.mppts || 2);
        if (mppts <= 1) {
          set(sensorIds.pv1_power_186, Number(newData.solar_power).toFixed(0), 'W', { device_class: 'power', state_class: 'measurement' });
          set(sensorIds.pv2_power_187, 0, 'W', { device_class: 'power', state_class: 'measurement' });
        } else {
          const pv1 = Number(newData.solar_power) * 0.52;
          const pv2 = Number(newData.solar_power) * 0.48;
          set(sensorIds.pv1_power_186, pv1.toFixed(0), 'W', { device_class: 'power', state_class: 'measurement' });
          set(sensorIds.pv2_power_187, pv2.toFixed(0), 'W', { device_class: 'power', state_class: 'measurement' });
        }
      }
      if (newData.battery_soc != null) set(sensorIds.battery_soc_184, newData.battery_soc, '%', { device_class: 'battery', state_class: 'measurement' });
      if (newData.battery_power != null) set(sensorIds.battery_power_190, newData.battery_power, 'W', { device_class: 'power', state_class: 'measurement' });
      if (newData.grid_power != null) {
        set(sensorIds.grid_power_169, newData.grid_power, 'W', { device_class: 'power', state_class: 'measurement' });
        set(sensorIds.grid_ct_power_172, newData.grid_power, 'W', { device_class: 'power', state_class: 'measurement' });
      }
      if (newData.inverter_power != null) set(sensorIds.inverter_power_175, newData.inverter_power, 'W', { device_class: 'power', state_class: 'measurement' });
      if (newData.inverter_voltage != null) set(sensorIds.inverter_voltage_154, newData.inverter_voltage, 'V', { device_class: 'voltage', state_class: 'measurement' });
      if (newData.load_frequency != null) set(sensorIds.load_frequency_192, newData.load_frequency, 'Hz', { device_class: 'frequency', state_class: 'measurement' });

      forceRender();
    };

    function randomTick() {
      const solar = 500 + Math.random() * 6000;
      const batteryP = (Math.random() - 0.55) * 4500;
      const gridP = (Math.random() - 0.45) * 3000;
      const invP = Math.max(100, solar + Math.max(0, batteryP) - Math.max(0, -gridP));
      const soc = Math.max(5, Math.min(98, Number(window.hass.states[sensorIds.battery_soc_184]?.state || 26) + (Math.random() - 0.48) * 2));

      window.updateSensors({
        solar_power: solar,
        battery_power: Math.round(batteryP),
        battery_soc: soc.toFixed(1),
        grid_power: Math.round(gridP),
        inverter_power: Math.round(invP),
        inverter_voltage: (229 + Math.random() * 6).toFixed(1),
        load_frequency: (49.95 + Math.random() * 0.15).toFixed(2),
      });
    }

    document.getElementById('btn-random').addEventListener('click', randomTick);

    async function syncFromAddonApi() {
      try {
        const r = await fetch('../api/data', { cache: 'no-store' });
        if (!r.ok) throw new Error(`api_data_http_${r.status}`);
        const j = await r.json();
        const n = j?.energy?.normalized || {};
        const ce = j?.energy?.card_entities || {};

        const num = (v) => {
          const x = Number(v);
          return Number.isFinite(x) ? x : null;
        };
        const fromCard = (k) => num(ce?.[k]?.value);
        const pick = (primary, fallback) => {
          const p = num(primary);
          if (p != null) return p;
          const f = num(fallback);
          return f != null ? f : 0;
        };

        const pv1 = fromCard('pv1_power_186');
        const pv2 = fromCard('pv2_power_187');
        const solarFallback = (pv1 != null || pv2 != null) ? (Number(pv1 || 0) + Number(pv2 || 0)) : null;
        const solarPower = pick(n.pv_power_w, solarFallback) * signFix.pv;
        const batteryPower = pick(n.battery_power_w, fromCard('battery_power_190')) * signFix.battery;
        const batterySoc = pick(n.battery_soc_pct, fromCard('battery_soc_184'));
        const gridPower = pick(n.grid_power_w, fromCard('grid_power_169')) * signFix.grid;
        const inverterPower = pick(n.home_power_w, fromCard('inverter_power_175')) * signFix.home;

        // campi opzionali: usa valore corrente se non disponibili
        const inverterVoltage = Number(
          j?.energy?.inverter_voltage_v ??
          window.hass.states[sensorIds.inverter_voltage_154]?.state ??
          231.5
        );
        const loadFrequency = Number(
          j?.energy?.load_frequency_hz ??
          window.hass.states[sensorIds.load_frequency_192]?.state ??
          50.0
        );

        window.updateSensors({
          solar_power: solarPower,
          battery_power: batteryPower,
          battery_soc: batterySoc,
          grid_power: gridPower,
          inverter_power: inverterPower,
          inverter_voltage: inverterVoltage,
          load_frequency: loadFrequency,
        });

        const setDaily = (id, value) => {
          if (value == null || Number.isNaN(Number(value))) return;
          const prev = window.hass.states[id] || mkState(0, 'kWh', { device_class: 'energy', state_class: 'total_increasing' });
          window.hass.states[id] = {
            ...prev,
            state: String(value),
            attributes: { ...(prev.attributes || {}), unit_of_measurement: 'kWh', device_class: 'energy', state_class: 'total_increasing' },
            last_updated: new Date().toISOString(),
          };
        };
        setDaily(sensorIds.day_pv_energy_108, n.pv_energy_today_kwh);
        setDaily(sensorIds.day_load_energy_84, n.home_energy_today_kwh);
        setDaily(sensorIds.day_grid_import_76, n.grid_import_today_kwh);
        setDaily(sensorIds.day_grid_export_77, n.grid_export_today_kwh);

        forceRender();
        const dbg = [
          `PV:${solarPower.toFixed(0)}W`,
          `HOME:${inverterPower.toFixed(0)}W`,
          `GRID:${gridPower.toFixed(0)}W`,
          `BAT:${batteryPower.toFixed(0)}W`,
        ].join(' | ');
        document.getElementById('status').textContent = `Dati reali da addon attivi - ${dbg}`;
      } catch (e) {
        document.getElementById('status').textContent = 'API non disponibile, uso ultimo stato / fallback';
      }
    }

    // avvio
    const waitCard = setInterval(async () => {
      if (customElements.get('sunsynk-power-flow-card')) {
        clearInterval(waitCard);
        await loadCardConfigFromAddonOptions();
        initCard();
        syncFromAddonApi();
        setInterval(syncFromAddonApi, 2000);
      }
    }, 100);
  </script>
</body>
</html>
