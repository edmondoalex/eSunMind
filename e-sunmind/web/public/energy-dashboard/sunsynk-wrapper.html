<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunsynk Wrapper Standalone (Hass Mock)</title>
  <link rel="icon" type="image/svg+xml" href="./energy-favicon.svg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" />
  <style>
    :root {
      --addon-bg: #080a10;
      --primary-background-color: #080a10;
      --card-background-color: #0f172a;
      --primary-text-color: #e2e8f0;
      --secondary-text-color: #94a3b8;
    }
    html, body { margin: 0; background: var(--addon-bg); color: var(--primary-text-color); font-family: Inter, Segoe UI, sans-serif; }
    .page { min-height: 100vh; display: grid; justify-items: center; align-content: center; gap: 14px; padding: 12px; box-sizing: border-box; }
    .energy-frame { position: relative; width: min(1200px, 98vw); }
    .host { width: 100%; }
    .sankey-section {
      width: min(1200px, 98vw);
      box-sizing: border-box;
    }
    .sankey-section[hidden] { display: none; }
    .sankey-host,
    .sankey-host sankey-chart,
    .sankey-host ha-card {
      display: block;
      width: 100%;
    }
    .sankey-host ha-card {
      box-sizing: border-box;
      background: color-mix(in srgb, var(--addon-bg) 74%, #1f2937);
      border: 1px solid rgba(148, 163, 184, .22);
      border-radius: 8px;
      box-shadow: none;
      overflow: hidden;
    }
    .energy-logo-box {
      position: absolute;
      z-index: 4;
      pointer-events: none;
      user-select: none;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .energy-logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      transform-origin: center;
    }
    .energy-logo-top-box .energy-logo { transform: scale(2.08); }
    .energy-logo-bottom-box .energy-logo { transform: scale(2.32); }
    .energy-site-name {
      position: absolute;
      z-index: 5;
      pointer-events: none;
      user-select: none;
      top: clamp(72px, 7.2vw, 90px);
      left: clamp(302px, 30.5%, 378px);
      width: clamp(370px, 36vw, 450px);
      text-align: center;
      color: var(--primary-text-color);
      font-size: clamp(12px, 1.15vw, 16px);
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
      text-shadow: 0 1px 4px rgba(0, 0, 0, .55);
      opacity: .92;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .energy-logo-top-box {
      top: clamp(0px, .25vw, 4px);
      left: clamp(292px, 29.5%, 360px);
      width: clamp(390px, 38vw, 470px);
      height: clamp(92px, 9.2vw, 112px);
      aspect-ratio: auto;
      max-height: none;
    }
    .energy-logo-bottom-box {
      left: clamp(395px, 39.5%, 475px);
      bottom: clamp(6px, 1.8vw, 22px);
      width: clamp(300px, 30vw, 370px);
      height: clamp(96px, 9.8vw, 118px);
      aspect-ratio: auto;
      max-height: none;
    }
    body.energy-card-compact .energy-logo-top-box,
    body.energy-card-lite .energy-logo-top-box {
      left: clamp(205px, 27%, 300px);
      width: clamp(300px, 38vw, 430px);
      height: clamp(78px, 9vw, 100px);
    }
    body.energy-card-compact .energy-logo-bottom-box,
    body.energy-card-lite .energy-logo-bottom-box {
      left: clamp(300px, 39%, 420px);
      width: clamp(240px, 30vw, 330px);
      height: clamp(76px, 9vw, 96px);
    }
    body.energy-card-compact .energy-site-name,
    body.energy-card-lite .energy-site-name {
      top: clamp(60px, 7vw, 76px);
      left: clamp(210px, 27%, 300px);
      width: clamp(290px, 37vw, 420px);
      font-size: clamp(11px, 1.1vw, 14px);
    }
    body.energy-card-minimal .energy-logo-top-box {
      left: clamp(145px, 24%, 245px);
      width: clamp(245px, 36vw, 370px);
      height: clamp(66px, 8.5vw, 86px);
    }
    body.energy-card-minimal .energy-logo-bottom-box {
      left: clamp(235px, 38%, 355px);
      width: clamp(200px, 27vw, 285px);
      height: clamp(60px, 8vw, 76px);
    }
    body.energy-card-minimal .energy-site-name {
      top: clamp(50px, 6.8vw, 68px);
      left: clamp(150px, 24%, 245px);
      width: clamp(235px, 35vw, 360px);
      font-size: clamp(10px, 1vw, 13px);
    }
    html.map-mode, body.map-mode { width: 100vw; height: 100vh; overflow: hidden; }
    body.map-mode .page { min-height: 100vh; height: 100vh; padding: 0; display: block; overflow: hidden; }
    body.map-mode .energy-frame { width: 100vw; height: 100vh; max-width: 100vw; transform-origin: top left; }
    body.map-mode .host { width: 100%; height: 100%; }
    body.map-mode sunsynk-power-flow-card { display: block; }
    body.map-mode .sankey-section { display: none; }
    body.energy-layout-k-flow .energy-logo-bottom-box,
    body.energy-layout-k-flow .energy-site-name { display: none; }
    body.energy-layout-k-flow .page {
      align-content: start;
    }
    body.energy-layout-k-flow .energy-frame {
      width: min(980px, 98vw);
      padding-top: clamp(118px, 15vw, 178px);
    }
    body.energy-layout-k-flow .energy-logo-top-box {
      display: flex;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(1040px, 96vw);
      height: clamp(108px, 14vw, 164px);
    }
    body.energy-layout-k-flow .energy-logo-top-box .energy-logo {
      transform: none;
    }
    body.energy-layout-k-flow k-flow-card {
      display: block;
      width: 100%;
    }
    .history-section {
      width: min(980px, 98vw);
      box-sizing: border-box;
    }
    .history-section[hidden],
    body.map-mode .history-section { display: none; }
    .kflow-history {
      background: #0d1117;
      border: 1px solid rgba(148, 163, 184, .22);
      border-radius: 8px;
      color: #e6edf3;
      padding: 14px;
      box-sizing: border-box;
      box-shadow: 0 12px 34px rgba(0, 0, 0, .28);
    }
    .kflow-history-head {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .kflow-history-title {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0;
    }
    .kflow-history-controls {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .energy-time-picker {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: min(500px, 100%);
      min-height: 44px;
      padding: 0 6px 0 12px;
      background: #161b22;
      color: #e6edf3;
      border: 1px solid rgba(148, 163, 184, .26);
      border-radius: 7px;
      box-sizing: border-box;
    }
    .energy-time-date {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 126px;
      font-weight: 700;
      text-transform: lowercase;
    }
    .energy-time-actions {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .energy-time-actions button,
    .energy-time-date button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      height: 32px;
      padding: 0 9px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: #e6edf3;
      font-weight: 800;
      cursor: pointer;
    }
    .energy-time-actions button:hover,
    .energy-time-date button:hover {
      background: rgba(148, 163, 184, .12);
    }
    .energy-time-actions .now {
      min-width: 76px;
      background: #0891b2;
      color: #ecfeff;
      font-size: .76rem;
    }
    .energy-time-periods {
      display: flex;
      gap: 4px;
      margin: 0 0 10px;
      flex-wrap: wrap;
    }
    .energy-time-periods button {
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, .22);
      background: #0b0f14;
      color: #94a3b8;
      font-weight: 700;
      cursor: pointer;
    }
    .energy-time-periods button.active {
      color: #ccfbf1;
      border-color: rgba(45, 212, 191, .6);
      background: rgba(45, 212, 191, .10);
    }
    .kflow-history-graph {
      position: relative;
      height: 280px;
      border-radius: 8px;
      background: radial-gradient(circle at 50% 42%, rgba(45, 212, 191, .08), transparent 44%), #0b0f14;
      border: 1px solid rgba(148, 163, 184, .14);
      overflow: hidden;
    }
    .kflow-history-node {
      position: absolute;
      width: 94px;
      height: 94px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      background: #0d1117;
      border: 2px solid var(--node-color, #2dd4bf);
      box-shadow: 0 0 24px color-mix(in srgb, var(--node-color, #2dd4bf) 28%, transparent);
      text-align: center;
    }
    .kflow-history-node .ico { font-size: 1.2rem; line-height: 1; }
    .kflow-history-node .val { font-size: .82rem; font-weight: 900; line-height: 1.05; }
    .kflow-history-node .sub { font-size: .62rem; color: #94a3b8; line-height: 1; }
    .kflow-history-node.pv { --node-color: #f59e0b; left: 50%; top: 16px; transform: translateX(-50%); }
    .kflow-history-node.grid { --node-color: #38bdf8; left: 9%; top: 98px; }
    .kflow-history-node.home { --node-color: #2dd4bf; right: 9%; top: 98px; }
    .kflow-history-node.batt { --node-color: #a78bfa; left: 50%; bottom: 16px; transform: translateX(-50%); }
    .kflow-history-lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .kflow-history-lines path {
      fill: none;
      stroke-width: 2.4;
      stroke-linecap: round;
      opacity: .86;
    }
    .kflow-history-bars {
      display: grid;
      grid-template-columns: repeat(var(--bar-count, 24), minmax(3px, 1fr));
      gap: 2px;
      align-items: stretch;
      height: 220px;
      margin-top: 12px;
      padding: 10px 8px 6px;
      background: #0b0f14;
      border: 1px solid rgba(148, 163, 184, .14);
      border-radius: 8px;
      box-sizing: border-box;
      position: relative;
    }
    .kflow-history-legend {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      align-items: center;
      font-size: .68rem;
      color: #cbd5e1;
    }
    .kflow-history-legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .kflow-history-legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, .08) inset;
      flex: 0 0 auto;
    }
    .kflow-history-bar-item {
      min-width: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) 16px;
      gap: 4px;
    }
    .kflow-history-bar-plot {
      position: relative;
      width: 100%;
      min-width: 0;
      height: 100%;
    }
    .kflow-history-zero {
      position: absolute;
      left: -1px;
      right: -1px;
      top: 50%;
      height: 1px;
      background: rgba(148, 163, 184, .22);
      transform: translateY(-.5px);
    }
    .kflow-history-bar-stack {
      position: absolute;
      left: 0;
      right: 0;
      min-width: 0;
      background: rgba(15, 23, 42, .82);
      border: 1px solid rgba(148, 163, 184, .14);
      box-sizing: border-box;
      overflow: hidden;
      display: flex;
      opacity: .96;
    }
    .kflow-history-bar-stack.pos {
      bottom: 50%;
      flex-direction: column-reverse;
      border-radius: 4px 4px 0 0;
      border-bottom: 0;
    }
    .kflow-history-bar-stack.neg {
      top: 50%;
      flex-direction: column;
      border-radius: 0 0 4px 4px;
      border-top: 0;
    }
    .kflow-history-bar-seg {
      width: 100%;
      min-height: 2px;
    }
    .kflow-history-bar-seg + .kflow-history-bar-seg {
      box-shadow: 0 -1px 0 rgba(8, 10, 16, .9) inset;
    }
    .kflow-history-bar-label {
      color: #8b949e;
      font-size: .58rem;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
    }
    .metric-history-modal {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: grid;
      place-items: center;
      padding: 16px;
      background: rgba(2, 6, 23, .66);
      box-sizing: border-box;
    }
    .metric-history-modal[hidden] { display: none; }
    .metric-history-panel {
      width: min(860px, 96vw);
      max-height: min(84vh, 640px);
      overflow: auto;
      background: #0d1117;
      border: 1px solid rgba(148, 163, 184, .28);
      border-radius: 8px;
      box-shadow: 0 26px 70px rgba(0, 0, 0, .46);
      color: #e6edf3;
    }
    .metric-history-head {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 8px;
    }
    .metric-history-title {
      font-size: 16px;
      font-weight: 800;
    }
    .metric-history-subtitle {
      margin-top: 3px;
      font-size: 12px;
      color: #94a3b8;
      word-break: break-word;
    }
    .metric-history-close {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(148, 163, 184, .28);
      border-radius: 8px;
      background: rgba(15, 23, 42, .72);
      color: #e6edf3;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }
    .metric-history-body {
      padding: 6px 16px 16px;
    }
    .metric-history-chart {
      width: 100%;
      height: 300px;
      border: 1px solid rgba(148, 163, 184, .16);
      border-radius: 8px;
      background: #111;
    }
    .metric-history-empty {
      padding: 34px 12px;
      text-align: center;
      color: #94a3b8;
      font-size: 13px;
    }
    @media (max-width: 640px) {
      .kflow-history-graph { height: 250px; }
      .kflow-history-node { width: 78px; height: 78px; }
      .kflow-history-node.grid { left: 3%; }
      .kflow-history-node.home { right: 3%; }
    }
    @media (max-width: 760px) {
      .energy-logo-top-box {
        top: 6px;
        left: 50%;
        transform: translateX(-50%);
        width: min(92vw, 430px);
        height: min(22vw, 92px);
      }
      .energy-logo-bottom-box {
        left: 50%;
        bottom: 7px;
        transform: translateX(-50%);
        width: min(76vw, 330px);
        height: min(20vw, 82px);
      }
      .energy-site-name {
        top: min(24vw, 96px);
        left: 50%;
        transform: translateX(-50%);
        width: min(86vw, 390px);
        font-size: 12px;
      }
    }
    @media (max-width: 520px) {
      .energy-logo-box { display: none; }
    }
    :root { --grid-tower-size: 64px; }
  </style>
</head>
<body>
  <div class="page">
    <div class="energy-frame" id="energyFrame">
      <div class="energy-logo-box energy-logo-top-box">
        <img class="energy-logo" id="energyTopLogo" src="./energymind.png" alt="EnergyMind" />
      </div>
      <div class="energy-site-name" id="energySiteName"></div>
      <div class="energy-logo-box energy-logo-bottom-box">
        <img class="energy-logo" src="./ekonex-original.png" alt="EKONEX" />
      </div>
      <div class="host" id="host"></div>
    </div>
    <section class="sankey-section" id="sankeySection" hidden>
      <div class="sankey-host" id="sankeyHost"></div>
    </section>
    <section class="history-section" id="historySection" hidden></section>
  </div>
  <div class="metric-history-modal" id="metricHistoryModal" hidden>
    <div class="metric-history-panel" role="dialog" aria-modal="true" aria-labelledby="metricHistoryTitle">
      <div class="metric-history-head">
        <div>
          <div class="metric-history-title" id="metricHistoryTitle">Storico</div>
          <div class="metric-history-subtitle" id="metricHistorySubtitle"></div>
        </div>
        <button class="metric-history-close" type="button" id="metricHistoryClose" title="Chiudi">x</button>
      </div>
      <div class="metric-history-body" id="metricHistoryBody"></div>
    </div>
  </div>

      c.battery = (c.battery && typeof c.battery === 'object' && !Array.isArray(c.battery)) ? c.battery : {};
      c.battery2 = (c.battery2 && typeof c.battery2 === 'object' && !Array.isArray(c.battery2)) ? c.battery2 : {};
      c.load = (c.load && typeof c.load === 'object' && !Array.isArray(c.load)) ? c.load : {};
      c.grid = (c.grid && typeof c.grid === 'object' && !Array.isArray(c.grid)) ? c.grid : {};
      c.inverter = (c.inverter && typeof c.inverter === 'object' && !Array.isArray(c.inverter)) ? c.inverter : {};
      c.entities = (c.entities && typeof c.entities === 'object' && !Array.isArray(c.entities)) ? c.entities : {};
      for (const k of REQUIRED_ENTITY_KEYS) {
        if (!(k in c.entities)) c.entities[k] = '';
      }
      for (const [k, v] of Object.entries(c.entities)) {
        if (v == null) c.entities[k] = '';
        else c.entities[k] = String(v);
      }
      c.solar.mppts = Number.isFinite(Number(c.solar.mppts)) ? Number(c.solar.mppts) : 1;
      c.battery.energy = Number.isFinite(Number(c.battery.energy)) ? Number(c.battery.energy) : 15960;
      c.battery.shutdown_soc = Number.isFinite(Number(c.battery.shutdown_soc)) ? Number(c.battery.shutdown_soc) : 10;
      c.battery.max_power = Number.isFinite(Number(c.battery.max_power)) ? Number(c.battery.max_power) : 5000;
      c.battery.animation_speed = Number.isFinite(Number(c.battery.animation_speed)) ? Number(c.battery.animation_speed) : 8;
      c.battery.auto_scale = Boolean(c.battery.auto_scale ?? true);
      c.battery.dynamic_colour = Boolean(c.battery.dynamic_colour ?? true);
      c.battery.linear_gradient = Boolean(c.battery.linear_gradient ?? true);
      c.battery.animate = Boolean(c.battery.animate ?? true);
      c.battery2.energy = Number.isFinite(Number(c.battery2.energy)) ? Number(c.battery2.energy) : c.battery.energy;
      c.battery2.shutdown_soc = Number.isFinite(Number(c.battery2.shutdown_soc)) ? Number(c.battery2.shutdown_soc) : c.battery.shutdown_soc;
      c.battery2.max_power = Number.isFinite(Number(c.battery2.max_power)) ? Number(c.battery2.max_power) : c.battery.max_power;
      c.battery2.animation_speed = Number.isFinite(Number(c.battery2.animation_speed)) ? Number(c.battery2.animation_speed) : c.battery.animation_speed;
      c.battery2.auto_scale = Boolean(c.battery2.auto_scale ?? c.battery.auto_scale);
      c.battery2.dynamic_colour = Boolean(c.battery2.dynamic_colour ?? c.battery.dynamic_colour);
      c.battery2.linear_gradient = Boolean(c.battery2.linear_gradient ?? c.battery.linear_gradient);
      c.battery2.animate = Boolean(c.battery2.animate ?? c.battery.animate);
      c.solar.dynamic_colour = Boolean(c.solar.dynamic_colour ?? true);
      c.load.additional_loads = Number.isFinite(Number(c.load.additional_loads)) ? Number(c.load.additional_loads) : 0;
      c.load.dynamic_colour = Boolean(c.load.dynamic_colour ?? true);
      c.load.dynamic_icon = Boolean(c.load.dynamic_icon ?? true);
      c.load.aux_dynamic_colour = Boolean(c.load.aux_dynamic_colour ?? true);
      c.load.off_colour = String(c.load.off_colour || 'grey');
      c.load.aux_off_colour = String(c.load.aux_off_colour || 'grey');
      c.grid.additional_loads = Number.isFinite(Number(c.grid.additional_loads)) ? Number(c.grid.additional_loads) : 0;
      return c;
    }

    function ensureInternalDailyEntities() {
      cardConfig.entities = cardConfig.entities || {};
      if (isConfiguredEntity(sourceEntityByCardKey.day_pv_energy_108) || isConfiguredEntity(cardConfig.entities.day_pv_energy_108)) {
        cardConfig.solar = cardConfig.solar || {};
        cardConfig.solar.show_daily = true;
      }
      if (
        (isConfiguredEntity(sourceEntityByCardKey.day_battery_charge_70) || isConfiguredEntity(cardConfig.entities.day_battery_charge_70)) &&
        (isConfiguredEntity(sourceEntityByCardKey.day_battery_discharge_71) || isConfiguredEntity(cardConfig.entities.day_battery_discharge_71))
      ) {
        cardConfig.battery = cardConfig.battery || {};
        cardConfig.battery.show_daily = true;
      }
      if (isConfiguredEntity(sourceEntityByCardKey.day_load_energy_84) || isConfiguredEntity(cardConfig.entities.day_load_energy_84)) {
        cardConfig.load = cardConfig.load || {};
        cardConfig.load.show_daily = true;
      }
      if (isConfiguredEntity(sourceEntityByCardKey.day_grid_import_76) || isConfiguredEntity(cardConfig.entities.day_grid_import_76)) {
        cardConfig.grid = cardConfig.grid || {};
        cardConfig.grid.show_daily_buy = true;
      }
      if (isConfiguredEntity(sourceEntityByCardKey.day_grid_export_77) || isConfiguredEntity(cardConfig.entities.day_grid_export_77)) {
        cardConfig.grid = cardConfig.grid || {};
        cardConfig.grid.show_daily_sell = true;
      }
      if (cardConfig.solar?.show_daily && !isConfiguredEntity(cardConfig.entities.day_pv_energy_108)) {
        cardConfig.entities.day_pv_energy_108 = sensorIds.day_pv_energy_108;
      }
      if (cardConfig.battery?.show_daily) {
        if (!isConfiguredEntity(cardConfig.entities.day_battery_charge_70)) cardConfig.entities.day_battery_charge_70 = sensorIds.day_battery_charge_70;
        if (!isConfiguredEntity(cardConfig.entities.day_battery_discharge_71)) cardConfig.entities.day_battery_discharge_71 = sensorIds.day_battery_discharge_71;
      }
      if (cardConfig.load?.show_daily && !isConfiguredEntity(cardConfig.entities.day_load_energy_84)) {
        cardConfig.entities.day_load_energy_84 = sensorIds.day_load_energy_84;
      }
      if (cardConfig.grid?.show_daily_buy && !isConfiguredEntity(cardConfig.entities.day_grid_import_76)) {
        cardConfig.entities.day_grid_import_76 = sensorIds.day_grid_import_76;
      }
      if (cardConfig.grid?.show_daily_sell && !isConfiguredEntity(cardConfig.entities.day_grid_export_77)) {
        cardConfig.entities.day_grid_export_77 = sensorIds.day_grid_export_77;
      }
    }

    function applyEnergyEntityFallbacks(e) {
      // Strict mode: no implicit mappings from addon energy_config.
      cardConfig.entities = cardConfig.entities || {};
    }

    function applyDashboardBackgroundColor(value) {
      const raw = String(value || '').trim();
      const color = /^#[0-9a-f]{6}$/i.test(raw) ? raw : '#080a10';
      document.documentElement.style.setProperty('--addon-bg', color);
      document.documentElement.style.setProperty('--primary-background-color', color);
      document.documentElement.style.setProperty('--lovelace-background', color);
      document.documentElement.style.setProperty('--ha-card-background', color);
      document.documentElement.style.backgroundColor = color;
      document.body.style.backgroundColor = color;
      document.querySelector('.page')?.style.setProperty('background', color);
      document.querySelector('.energy-frame')?.style.setProperty('background', color);
    }

      document.body.classList.remove('energy-layout-sunsynk', 'energy-layout-k-flow');
      const isKFlow = energyDashboardLayout === 'k_flow';
      document.body.classList.add(`energy-layout-${isKFlow ? 'k-flow' : 'sunsynk'}`);

      if (energyDashboardLayout === 'k_flow') {

        return;
      }

    function siteLabel(site) {
      return String(site?.site_name || site?.name || site?.id || site?.site_id || SITE_ID || '').trim();

    function applySignFlowOverrides() {
      cardConfig.solar = cardConfig.solar || {};
      cardConfig.battery = cardConfig.battery || {};
      cardConfig.battery2 = cardConfig.battery2 || {};
      cardConfig.load = cardConfig.load || {};
      cardConfig.grid = cardConfig.grid || {};

      const isNegative = (key) => entitySignMap[String(key)] === 'negative';
      const firstNegative = (keys) => keys.some((key) => isConfiguredEntity(cardConfig.entities?.[key]) && isNegative(key));
      // Keep HA states raw and let the Sunsynk card apply its own inversion
      // flags. Otherwise numbers and animated flow direction can diverge.
      cardConfig.solar.invert_flow = firstNegative(['pv_total', 'pv1_power_186', 'pv2_power_187', 'pv3_power_188', 'pv4_power_189', 'pv5_power', 'pv6_power']);
      cardConfig.battery.invert_flow = isNegative('battery_power_190');
      cardConfig.battery2.invert_flow = isNegative('battery2_power_190');
      cardConfig.load.invert_load = isNegative('inverter_power_175') || isNegative('essential_power');
      cardConfig.load.invert_aux = isNegative('aux_power_166');
      cardConfig.grid.invert_grid = isNegative('grid_power_169') || isNegative('grid_ct_power_172');
    }

    function enforceTopologyFromConfig() {
      if (!cardConfig || typeof cardConfig !== 'object' || Array.isArray(cardConfig)) {
        cardConfig = {};
      }
      if (!cardConfig.entities || typeof cardConfig.entities !== 'object' || Array.isArray(cardConfig.entities)) {
        cardConfig.entities = {};
      }
      cardConfig.solar = cardConfig.solar || {};
      cardConfig.battery = cardConfig.battery || {};
      cardConfig.battery2 = cardConfig.battery2 || {};
      cardConfig.inverter = cardConfig.inverter || {};
      cardConfig.entities = cardConfig.entities || {};
      cardConfig.load = cardConfig.load || {};
      cardConfig.grid = cardConfig.grid || {};
      cardConfig.load.show_aux = Boolean(cardConfig.load.show_aux ?? false);
      cardConfig.grid.show_nonessential = Boolean(cardConfig.grid.show_nonessential ?? false);
      cardConfig.grid.additional_loads = Number.isFinite(Number(cardConfig.grid.additional_loads))
        ? Math.max(0, Math.min(3, Number(cardConfig.grid.additional_loads)))
        : 0;
      cardConfig.show_solar = Boolean(cardConfig.show_solar ?? true);
      cardConfig.show_battery = Boolean(cardConfig.show_battery ?? true);
      cardConfig.show_grid = Boolean(cardConfig.show_grid ?? true);
      cardConfig.dynamic_line_width = Boolean(cardConfig.dynamic_line_width ?? true);
      cardConfig.min_line_width = Number.isFinite(Number(cardConfig.min_line_width)) ? Number(cardConfig.min_line_width) : 1;
      cardConfig.max_line_width = Number.isFinite(Number(cardConfig.max_line_width)) ? Number(cardConfig.max_line_width) : 4;
      cardConfig.wide = Boolean(cardConfig.wide ?? false);
      cardConfig.cardstyle = String(cardConfig.cardstyle || 'full');
      cardConfig.type = String(cardConfig.type || 'custom:sunsynk-power-flow-card');
      // Keep icon values as configured from UI/JSON (including custom mdi:*),
      // only fallback to default when empty.
      for (const k of ['load1_icon', 'load2_icon', 'load3_icon', 'load4_icon', 'load5_icon', 'load6_icon']) {
        cardConfig.load[k] = String(cardConfig.load[k] || 'default').trim() || 'default';
      }
      for (const k of ['nonessential_icon', 'load1_icon', 'load2_icon', 'load3_icon']) {
        cardConfig.grid[k] = String(cardConfig.grid[k] || 'default').trim() || 'default';
      }
      for (const k of ['import_icon', 'export_icon', 'disconnected_icon']) {
        const raw = String(cardConfig.grid[k] || '').trim();
        if (!raw) {
          cardConfig.grid[k] = k === 'import_icon'
            ? 'mdi:transmission-tower-import'
            : k === 'export_icon'
              ? 'mdi:transmission-tower-export'
              : 'mdi:transmission-tower-off';
        } else {
          cardConfig.grid[k] = raw;
        }
      }
      // No synthetic PV channel estimation: show only channels that are explicitly mapped.
      const pvMapped = [
        isConfiguredEntity(cardConfig.entities.pv1_power_186),
        isConfiguredEntity(cardConfig.entities.pv2_power_187),
        isConfiguredEntity(cardConfig.entities.pv3_power_188),
        isConfiguredEntity(cardConfig.entities.pv4_power_189),
        isConfiguredEntity(cardConfig.entities.pv5_power),
        isConfiguredEntity(cardConfig.entities.pv6_power),
      ];
      const mappedCount = pvMapped.filter(Boolean).length;
      cardConfig.solar.mppts = Math.max(1, mappedCount || 1);
      if (!isConfiguredEntity(cardConfig.entities.pv1_voltage_109)) delete cardConfig.entities.pv1_voltage_109;
      if (!isConfiguredEntity(cardConfig.entities.pv1_current_110)) delete cardConfig.entities.pv1_current_110;
      if (!isConfiguredEntity(cardConfig.entities.pv2_voltage_111)) delete cardConfig.entities.pv2_voltage_111;
      if (!isConfiguredEntity(cardConfig.entities.pv2_current_112)) delete cardConfig.entities.pv2_current_112;
      if (!isConfiguredEntity(cardConfig.entities.pv3_voltage_113)) delete cardConfig.entities.pv3_voltage_113;
      if (!isConfiguredEntity(cardConfig.entities.pv3_current_114)) delete cardConfig.entities.pv3_current_114;
      if (!isConfiguredEntity(cardConfig.entities.pv4_voltage_115)) delete cardConfig.entities.pv4_voltage_115;
      if (!isConfiguredEntity(cardConfig.entities.pv4_current_116)) delete cardConfig.entities.pv4_current_116;
      if (!isConfiguredEntity(cardConfig.entities.pv5_voltage)) delete cardConfig.entities.pv5_voltage;
      if (!isConfiguredEntity(cardConfig.entities.pv5_current)) delete cardConfig.entities.pv5_current;
      if (!isConfiguredEntity(cardConfig.entities.pv6_voltage)) delete cardConfig.entities.pv6_voltage;
      if (!isConfiguredEntity(cardConfig.entities.pv6_current)) delete cardConfig.entities.pv6_current;
      if (!pvMapped[1]) {
        delete cardConfig.entities.pv2_power_187;
      }
      if (!pvMapped[2]) {
        delete cardConfig.entities.pv3_power_188;
      }
      if (!pvMapped[3]) {
        delete cardConfig.entities.pv4_power_189;
      }
      if (!pvMapped[4]) {
        delete cardConfig.entities.pv5_power;
      }
      if (!pvMapped[5]) {
        delete cardConfig.entities.pv6_power;
      }
      if (!isConfiguredEntity(cardConfig.entities.battery2_power_190)) {
        cardConfig.battery.count = 1;
        delete cardConfig.entities.battery2_power_190;
      }
      // No synthetic load branches: show only mapped essential/aux/non-essential channels.
      const essentialMapped = [
        isConfiguredEntity(cardConfig.entities.essential_load1),
        isConfiguredEntity(cardConfig.entities.essential_load2),
        isConfiguredEntity(cardConfig.entities.essential_load3),
        isConfiguredEntity(cardConfig.entities.essential_load4),
        isConfiguredEntity(cardConfig.entities.essential_load5),
        isConfiguredEntity(cardConfig.entities.essential_load6),
      ];
      const essentialCount = essentialMapped.filter(Boolean).length;
      const visibleEssentialMapped = [...essentialMapped];
      cardConfig.load.additional_loads = essentialCount;
      if (String(cardConfig.cardstyle || 'full') === 'full') {
        // Sunsynk full-card internally invalidates additional_loads 3-6 when
        // show_aux is true, and invalidates exactly 3 even without AUX. If AUX
        // is requested, keep AUX visible and cap essential load branches to 2.
        if (Boolean(cardConfig.load.show_aux) && essentialCount > 2) {
          cardConfig.load.additional_loads = 2;
          visibleEssentialMapped[2] = false;
          visibleEssentialMapped[3] = false;
          visibleEssentialMapped[4] = false;
          visibleEssentialMapped[5] = false;
        } else if (essentialCount === 3) {
          cardConfig.load.additional_loads = 2;
          visibleEssentialMapped[2] = false;
        }
      }
      if (!visibleEssentialMapped[0]) delete cardConfig.entities.essential_load1;
      if (!visibleEssentialMapped[1]) delete cardConfig.entities.essential_load2;
      if (!visibleEssentialMapped[2]) delete cardConfig.entities.essential_load3;
      if (!visibleEssentialMapped[3]) delete cardConfig.entities.essential_load4;
      if (!visibleEssentialMapped[4]) delete cardConfig.entities.essential_load5;
      if (!visibleEssentialMapped[5]) delete cardConfig.entities.essential_load6;

      const auxMapped = [
        isConfiguredEntity(cardConfig.entities.aux_power_166),
        ...Array.from({ length: 7 }, (_, idx) => isConfiguredEntity(cardConfig.entities[`aux_load${idx + 1}`])),
      ];
      cardConfig.load.show_aux = auxMapped.some(Boolean) && Boolean(cardConfig.load.show_aux);
      if (!auxMapped[0]) delete cardConfig.entities.aux_power_166;
      for (let i = 1; i <= 7; i += 1) {
        if (!auxMapped[i]) delete cardConfig.entities[`aux_load${i}`];
      }

      const nonEssentialMapped = [
        isConfiguredEntity(cardConfig.entities.non_essential_load1),
        isConfiguredEntity(cardConfig.entities.non_essential_load2),
        isConfiguredEntity(cardConfig.entities.non_essential_load3),
      ];
      const nonEssentialCount = nonEssentialMapped.filter(Boolean).length;
      cardConfig.grid.additional_loads = nonEssentialCount;
      cardConfig.grid.show_nonessential = nonEssentialCount > 0 && Boolean(cardConfig.grid.show_nonessential);
      if (!nonEssentialMapped[0]) delete cardConfig.entities.non_essential_load1;
      if (!nonEssentialMapped[1]) delete cardConfig.entities.non_essential_load2;
      if (!nonEssentialMapped[2]) delete cardConfig.entities.non_essential_load3;
      // If main essential power is not mapped but essential_load1 is mapped,
      // use that mapped entity as the main essential power source.
      if (!isConfiguredEntity(cardConfig.entities.essential_power) && isConfiguredEntity(cardConfig.entities.essential_load1)) {
        cardConfig.entities.essential_power = String(cardConfig.entities.essential_load1);
      }
      const hasPv = Boolean([
        'pv_total',
        'pv1_power_186',
        'pv2_power_187',
        'pv3_power_188',
        'pv4_power_189',
        'pv5_power',
        'pv6_power',
      ].some((k) => isConfiguredEntity(cardConfig.entities?.[k])));
      const hasBattery = Boolean(isConfiguredEntity(cardConfig.entities.battery_power_190) || isConfiguredEntity(cardConfig.entities.battery_soc_184));
      const hasGrid = Boolean(isConfiguredEntity(cardConfig.entities.grid_power_169) || isConfiguredEntity(cardConfig.entities.grid_ct_power_172));
      cardConfig.show_solar = Boolean(cardConfig.show_solar && hasPv);
      cardConfig.show_battery = Boolean(cardConfig.show_battery && hasBattery);
      cardConfig.show_grid = Boolean(cardConfig.show_grid && hasGrid);
      ensureInternalDailyEntities();
      sanitizeMissingOptionalEntities();
    }

    function disableIfMissing(section, flag, requiredKeys) {
      const target = cardConfig?.[section];
      if (!target || typeof target !== 'object') return;
      const keys = Array.isArray(requiredKeys) ? requiredKeys : [requiredKeys];
      const missing = keys.filter((k) => !isConfiguredEntity(cardConfig.entities?.[k]));
      if (!missing.length) return;
      target[flag] = false;
      for (const k of missing) delete cardConfig.entities[k];
    }

    function sanitizeMissingOptionalEntities() {
      cardConfig.entities = cardConfig.entities || {};
      cardConfig.solar = cardConfig.solar || {};
      cardConfig.battery = cardConfig.battery || {};
      cardConfig.battery2 = cardConfig.battery2 || {};
      cardConfig.load = cardConfig.load || {};
      cardConfig.grid = cardConfig.grid || {};

      disableIfMissing('solar', 'show_daily', 'day_pv_energy_108');
      disableIfMissing('battery', 'show_daily', ['day_battery_charge_70', 'day_battery_discharge_71']);
      disableIfMissing('battery2', 'show_daily', ['day_battery_charge_70', 'day_battery_discharge_71']);
      disableIfMissing('load', 'show_daily', 'day_load_energy_84');
      disableIfMissing('load', 'show_daily_aux', 'day_aux_energy');
      disableIfMissing('grid', 'show_daily_buy', 'day_grid_import_76');
      disableIfMissing('grid', 'show_daily_sell', 'day_grid_export_77');

      if (!isConfiguredEntity(cardConfig.entities.grid_connected_status_194)) {
        delete cardConfig.entities.grid_connected_status_194;
      }
      if (!isConfiguredEntity(cardConfig.entities.inverter_status_59)) {
        delete cardConfig.entities.inverter_status_59;
      }
    }

    async function loadCardConfigFromAddonOptions() {
      try {
        const r = await fetch('../api/options', { cache: 'no-store' });
        if (!r.ok) return;
        const j = await r.json();
        const energyRoot = j?.energy || {};
        const e = selectEnergySite(energyRoot);
        energyDashboardLayout = normalizeDashboardLayout(e?.energy_dashboard_layout);
        applyDashboardLayoutClass();
        setDashboardSiteName(e);
        applyDashboardBackgroundColor(e?.dashboard_background_color);
        try {
          Object.keys(entitySignMap).forEach((k) => delete entitySignMap[k]);
          const rawSigns = String(e?.entity_signs_json || '').trim();
          if (rawSigns) {
            const parsedSigns = JSON.parse(rawSigns);
            if (parsedSigns && typeof parsedSigns === 'object' && !Array.isArray(parsedSigns)) {
              for (const [k, v] of Object.entries(parsedSigns)) {
                const vv = String(v || '').toLowerCase();
                if (vv === 'positive' || vv === 'negative') entitySignMap[String(k)] = vv;
              }
            }
          }
        } catch (_) {}
        applyEnergyEntityFallbacks(e);
        cardConfig = createBaseCardConfig();
        const raw = e?.sunsynk_card_config_json;
        if (raw) {
          const parsed = JSON.parse(String(raw));
          if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
            cardConfig = deepMerge(cardConfig, parsed);
          }
        }
        captureSourceEntities();
        enforceTopologyFromConfig();
        applySignFlowOverrides();
        kFlowCardConfig = buildKFlowConfig(e);
      } catch (_) {
        captureSourceEntities();
        enforceTopologyFromConfig();
        applySignFlowOverrides();
        kFlowCardConfig = buildKFlowConfig({});
      }
    }

    function seedStates() {
      const now = new Date().toISOString();
      if (!window.hass.states['sun.sun']) {
        window.hass.states['sun.sun'] = {
          entity_id: 'sun.sun',
          state: 'above_horizon',
          attributes: {
            next_rising: new Date(Date.now() + 18 * 60 * 60 * 1000).toISOString(),
            next_setting: new Date(Date.now() + 6 * 60 * 60 * 1000).toISOString(),
            elevation: 35,
          },
          last_changed: now,
          last_updated: now,
        };
      }
      const all = cardConfig?.entities && typeof cardConfig.entities === 'object' ? cardConfig.entities : {};
      for (const v of Object.values(all)) {
        const id = String(v || '').trim();
        if (!isConfiguredEntity(id)) continue;
        if (window.hass.states[id]) continue;
        if (id.startsWith('binary_sensor.')) {
          window.hass.states[id] = {
            entity_id: id,
            state: 'on',
            attributes: { device_class: 'power', state_class: '' },
            last_changed: now,
            last_updated: now,
          };
        } else if (id.includes('status')) {
          window.hass.states[id] = {
            entity_id: id,
            state: 'Normal',
            attributes: {},
            last_changed: now,
            last_updated: now,
          };
        } else {
          window.hass.states[id] = mkState(0, '', { entity_id: id });
        }
      }
    }

    function updateSunStateFromESunMind(payload = {}) {
      const times = payload?.sun_times && typeof payload.sun_times === 'object' ? payload.sun_times : {};
      const position = payload?.sun_position && typeof payload.sun_position === 'object' ? payload.sun_position : {};
      const sunrise = String(times.sunrise || '').trim();
      const sunset = String(times.sunset || '').trim();
      const elevation = Number(position.altitude_deg);
      if (!sunrise && !sunset && !Number.isFinite(elevation)) return;
      const now = new Date().toISOString();
      const prev = window.hass.states['sun.sun'] || mkState('above_horizon', '', { entity_id: 'sun.sun' });
      window.hass.states['sun.sun'] = {
        ...prev,
        entity_id: 'sun.sun',

      if (!card || energyDashboardLayout === 'k_flow') return;
      const root = card.shadowRoot;
      if (!root) return;
      const hideCandidate = (el) => {
        if (!(el instanceof SVGGraphicsElement || el instanceof HTMLElement)) return;
        if (el.dataset?.esunmindSunIconHidden === '1') return;
        let box = null;
        try {
          if (typeof el.getBBox === 'function') box = el.getBBox();
        } catch (_) {}
        if (!box || !Number.isFinite(box.x) || !Number.isFinite(box.y)) return;
        const centerX = box.x + (box.width / 2);
        const centerY = box.y + (box.height / 2);
        const isTopMiddle = centerX >= 150 && centerX <= 310 && centerY >= 8 && centerY <= 95;
        const isSmall = box.width <= 42 && box.height <= 42;
        if (!isTopMiddle || !isSmall) return;
        el.style.setProperty('display', 'none', 'important');
        el.style.setProperty('opacity', '0', 'important');
        if (el.dataset) el.dataset.esunmindSunIconHidden = '1';
      };
      root.querySelectorAll('svg image, svg g, ha-icon').forEach(hideCandidate);
    }

      for (let i = 1; i <= 6; i += 1) {
        push(configuredLoadNode(`essential_load${i}`, String(load[`load${i}_name`] || `Load ${i}`), String(load.colour || '#f59e0b')));
      }
      push(configuredLoadNode('aux_power_166', String(load.aux_name || 'AUX'), String(load.aux_colour || '#94a3b8')));
      for (let i = 1; i <= 7; i += 1) {
        push(configuredLoadNode(`aux_load${i}`, String(load[`aux_load${i}_name`] || `AUX load ${i}`), String(load.aux_colour || '#94a3b8')));
      }
      push(configuredLoadNode('nonessential_power', String(grid.nonessential_name || 'Non Essential'), String(grid.colour || '#38bdf8')));
      for (let i = 1; i <= 3; i += 1) {
        push(configuredLoadNode(`non_essential_load${i}`, String(grid[`load${i}_name`] || `Non-essential ${i}`), String(grid.colour || '#38bdf8')));
      }
      return nodes;

    function updateSankeyChart(siteEnergy = {}) {
      if (!sankeyReady || !sankeyCard || MAP_MODE) return;
      const pv = Math.max(0, readNumericState(entityId('pv_total')) || ['pv1_power_186', 'pv2_power_187', 'pv3_power_188', 'pv4_power_189', 'pv5_power', 'pv6_power'].reduce((sum, key) => sum + Math.max(0, readNumericState(entityId(key))), 0));
      const grid = readNumericState(entityId('grid_power_169')) || readNumericState(entityId('grid_ct_power_172'));
      const battery = readNumericState(entityId('battery_power_190'));
      const homeRaw = readNumericState(entityId('essential_power')) || readNumericState(entityId('inverter_power_175'));
      const loadNodes = [...getSankeyLoadNodes(), ...configuredSankeyExtraLoadNodes(siteEnergy)];
      const loadRawValues = loadNodes.map((node) => Math.max(0, readNumericState(node.id)));
      const loadSum = loadRawValues.reduce((sum, value) => sum + value, 0);
      const home = Math.max(0, homeRaw);
      const loadScale = loadSum > home && home > 0 ? home / loadSum : 1;
      const otherLoads = Math.max(0, home - (loadSum * loadScale));
      const gridImportPositive = Boolean(cardConfig?.grid?.invert_grid);
      const batteryChargePositive = Boolean(cardConfig?.battery?.invert_flow);
      const gridImport = gridImportPositive ? Math.max(0, grid) : Math.max(0, -grid);
      const gridExport = gridImportPositive ? Math.max(0, -grid) : Math.max(0, grid);
      const batteryCharge = batteryChargePositive ? Math.max(0, battery) : Math.max(0, -battery);
      const batteryDischarge = batteryChargePositive ? Math.max(0, -battery) : Math.max(0, battery);

      let remainingHome = home;
      const pvToHome = Math.min(remainingHome, pv);
      remainingHome = Math.max(0, remainingHome - pvToHome);
      const gridToHome = Math.min(remainingHome, gridImport);
      remainingHome = Math.max(0, remainingHome - gridToHome);
      const batteryToHome = Math.min(remainingHome, batteryDischarge);
      const pvAfterHome = Math.max(0, pv - pvToHome);
      const pvToBattery = Math.min(pvAfterHome, batteryCharge);
      const pvToGrid = Math.min(Math.max(0, pvAfterHome - pvToBattery), gridExport);
      const knownToHome = pvToHome + gridToHome + batteryToHome;
      const unknownToHome = Math.max(0, home - knownToHome);

      setSyntheticPowerState(sankeyIds.pv, pv, 'FV');
      setSyntheticPowerState(sankeyIds.gridImport, gridImport, 'Import rete');
      setSyntheticPowerState(sankeyIds.batteryDischarge, batteryDischarge, 'Scarica batteria');
      setSyntheticPowerState(sankeyIds.unknownSource, unknownToHome, 'Altro ingresso');
      setSyntheticPowerState(sankeyIds.home, home, 'Carico casa');
      setSyntheticPowerState(sankeyIds.gridExport, gridExport, 'Export rete');
      setSyntheticPowerState(sankeyIds.batteryCharge, batteryCharge, 'Carica batteria');
      setSyntheticPowerState(sankeyIds.pvToHome, pvToHome, 'FV verso casa');
      setSyntheticPowerState(sankeyIds.pvToGrid, pvToGrid, 'FV verso rete');
      setSyntheticPowerState(sankeyIds.pvToBattery, pvToBattery, 'FV verso batteria');
      setSyntheticPowerState(sankeyIds.gridToHome, gridToHome, 'Rete verso casa');
      setSyntheticPowerState(sankeyIds.batteryToHome, batteryToHome, 'Batteria verso casa');
      setSyntheticPowerState(sankeyIds.unknownToHome, unknownToHome, 'Altro verso casa');
      setSyntheticPowerState(sankeyIds.otherLoads, otherLoads, 'Altri carichi');
      loadNodes.forEach((node, idx) => {
        setSyntheticPowerState(node.id, loadRawValues[idx] * loadScale, node.name || node.id);
      });

      try {
        sankeyCard.setConfig(buildSankeyConfig(siteEnergy));
      } catch (e) {
        console.warn('e-SunMind Sankey config failed', e);
        return;
      }
      sankeySection.hidden = false;
      forceRender();
    }

    function energyHistoryInputType() {
      if (energyHistoryPeriod === 'month') return 'month';
      if (energyHistoryPeriod === 'year') return 'number';
      return 'date';
    }

    function energyHistoryInputValue() {
      if (energyHistoryPeriod === 'month') return String(energyHistoryDate || '').slice(0, 7) || new Date().toISOString().slice(0, 7);
      if (energyHistoryPeriod === 'year') return String(energyHistoryDate || '').slice(0, 4) || new Date().getFullYear();
      return String(energyHistoryDate || '').slice(0, 10) || new Date().toISOString().slice(0, 10);
    }

    function energyTimeLabel() {
      const value = energyHistoryInputValue();
      const monthNames = ['gennaio', 'febbraio', 'marzo', 'aprile', 'maggio', 'giugno', 'luglio', 'agosto', 'settembre', 'ottobre', 'novembre', 'dicembre'];
      if (energyHistoryPeriod === 'year') return value;
      if (energyHistoryPeriod === 'month') {
        const m = Number(value.slice(5, 7));
        return monthNames[m - 1] || value;
      }
      try {
        const d = new Date(`${value}T12:00:00`);
        return `${d.getDate()} ${monthNames[d.getMonth()] || ''}`.trim();
      } catch (_) {
        return value;
      }
    }

    function setEnergyTimeNow() {
      const today = new Date().toISOString().slice(0, 10);
      if (energyHistoryPeriod === 'month') energyHistoryDate = today.slice(0, 7);
      else if (energyHistoryPeriod === 'year') energyHistoryDate = today.slice(0, 4);
      else energyHistoryDate = today;
      loadEnergyHistory(true);
    }

    function shiftEnergyTime(dir) {
      const step = Number(dir) < 0 ? -1 : 1;
      const value = energyHistoryInputValue();
      if (energyHistoryPeriod === 'year') {
        energyHistoryDate = String((Number(value) || new Date().getFullYear()) + step);
      } else if (energyHistoryPeriod === 'month') {
        const d = new Date(`${value}-01T12:00:00`);
        d.setMonth(d.getMonth() + step);
        energyHistoryDate = d.toISOString().slice(0, 7);
      } else {
        const d = new Date(`${value}T12:00:00`);
        d.setDate(d.getDate() + step);
        energyHistoryDate = d.toISOString().slice(0, 10);
      }
      loadEnergyHistory(true);
    }

    function fmtKwh(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return '0 kWh';
      if (Math.abs(n) >= 1000) return `${(n / 1000).toFixed(2)} MWh`;
      return `${n.toFixed(n >= 10 ? 1 : 2)} kWh`;
    }

      return (Array.isArray(values) ? values : []).reduce((sum, v) => sum + (Number.isFinite(Number(v)) ? Number(v) : 0), 0);

        ...seriesDefs.map(({ key }) => Array.isArray(series[key]) ? series[key].length : 0),
      );
      const activeDefs = seriesDefs.filter(({ key }) => (Array.isArray(series[key]) ? series[key] : []).some((v) => Number(v) > 0));
      const visibleDefs = activeDefs.length ? activeDefs : seriesDefs.filter(({ key }) => key === 'load' || key === 'pv');
      const signedTotals = Array.from({ length: barCount }, (_, i) => {
        return visibleDefs.reduce((totals, def) => {
          const raw = Math.max(0, Number((series?.[def.key] || [])[i]) || 0);
          if (def.side === 'neg') totals.neg += raw;
          else totals.pos += raw;
          return totals;
        }, { pos: 0, neg: 0 });
      });
      const maxBar = Math.max(0.1, ...signedTotals.flatMap((totals) => [totals.pos, totals.neg]));
      historySection.hidden = false;
      historySection.innerHTML = `
        <div class="kflow-history">
          <div class="kflow-history-head">
            <div class="kflow-history-title">Energy Time</div>
            <div class="kflow-history-controls">
              <div class="energy-time-picker">

                  <button type="button" title="Successivo" onclick="window.shiftEnergyTime(1)">›</button>

            </div>
          </div>
          <div class="energy-time-periods">
            <button type="button" class="${energyHistoryPeriod === 'day' ? 'active' : ''}" onclick="window.setEnergyTimePeriod('day')">Giorno</button>
            <button type="button" class="${energyHistoryPeriod === 'month' ? 'active' : ''}" onclick="window.setEnergyTimePeriod('month')">Mese</button>
            <button type="button" class="${energyHistoryPeriod === 'year' ? 'active' : ''}" onclick="window.setEnergyTimePeriod('year')">Anno</button>
          </div>
          <div class="kflow-history-graph">
            <svg class="kflow-history-lines" viewBox="0 0 760 280" preserveAspectRatio="none" aria-hidden="true">
              <path d="M380 64 C360 118 250 140 145 145" stroke="#f59e0b"></path>
              <path d="M380 64 C412 120 520 138 615 145" stroke="#f59e0b"></path>
              <path d="M145 145 C275 145 438 145 615 145" stroke="#38bdf8"></path>
              <path d="M380 216 C374 178 438 150 615 145" stroke="#a78bfa"></path>
              <path d="M380 216 C360 178 248 152 145 145" stroke="#a78bfa"></path>
            </svg>
            <div class="kflow-history-node pv"><div class="sub">Solare</div><div class="ico">⚡</div><div class="val">${fmtKwh(totals.pv)}</div></div>
            <div class="kflow-history-node grid"><div class="sub">Rete elettrica</div><div class="ico">▦</div><div class="val">↓ ${fmtKwh(totals.grid_import)}</div><div class="sub">↑ ${fmtKwh(totals.grid_export)}</div></div>
            <div class="kflow-history-node home"><div class="sub">Casa</div><div class="ico">⌂</div><div class="val">${fmtKwh(totals.load)}</div></div>
            <div class="kflow-history-node batt"><div class="sub">Batteria</div><div class="ico">▣</div><div class="val">↓ ${fmtKwh(totals.battery_charge)}</div><div class="sub">↑ ${fmtKwh(totals.battery_discharge)}</div></div>
          </div>
          <div class="kflow-history-legend">
            ${visibleDefs.map((def) => `<span class="kflow-history-legend-item"><span class="kflow-history-legend-swatch" style="background:${def.color}"></span>${def.label}</span>`).join('')}
          </div>
          <div class="kflow-history-bars" style="--bar-count:${barCount}">
            ${Array.from({ length: barCount }, (_, i) => {
              const label = labels[i] || '';
              const totals = signedTotals[i] || { pos: 0, neg: 0 };
              const posH = totals.pos > 0 ? Math.max(2, Math.round((totals.pos / maxBar) * 50)) : 0;
              const negH = totals.neg > 0 ? Math.max(2, Math.round((totals.neg / maxBar) * 50)) : 0;
              const posParts = visibleDefs.filter((def) => def.side !== 'neg').map((def) => {
                const raw = Math.max(0, Number((series?.[def.key] || [])[i]) || 0);
                if (raw <= 0 || totals.pos <= 0) return '';
                const segHeight = Math.max(2, (raw / totals.pos) * 100);
                return `<div class="kflow-history-bar-seg" style="height:${segHeight}%;background:${def.color}"></div>`;
              }).filter(Boolean).join('');
              const negParts = visibleDefs.filter((def) => def.side === 'neg').map((def) => {
                const raw = Math.max(0, Number((series?.[def.key] || [])[i]) || 0);
                if (raw <= 0 || totals.neg <= 0) return '';
                const segHeight = Math.max(2, (raw / totals.neg) * 100);
                return `<div class="kflow-history-bar-seg" style="height:${segHeight}%;background:${def.color}"></div>`;

              const title = `${label || energyHistoryPeriod} | ${visibleDefs.map((def) => {

    function metricHistoryDateValue() {
      if (energyHistoryPeriod === 'day') return energyHistoryInputValue();

    function formatMetricValue(value, unit, kind) {
      const n = Number(value);
      if (!Number.isFinite(n)) return `-- ${unit || ''}`.trim();
      if (kind === 'power') return `${n.toFixed(0)} ${unit || 'W'}`;
      return `${n.toFixed(1)} ${unit || ''}`.trim();
    }

    function metricHistorySvg(payload) {
      const points = Array.isArray(payload?.points) ? payload.points.filter((p) => Number.isFinite(Number(p.value))) : [];
      if (!points.length) {
        return '<div class="metric-history-empty">Nessun dato storico disponibile per questo sensore nel giorno selezionato.</div>';
      }
      const width = 760;
      const height = 300;
      const pad = { left: 48, right: 18, top: 22, bottom: 34 };
      const plotW = width - pad.left - pad.right;
      const plotH = height - pad.top - pad.bottom;
      const values = points.map((p) => Number(p.value));
      const kind = String(payload.kind || '');
      let min = Math.min(...values);
      let max = Math.max(...values);
      if (kind === 'power') {
        min = Math.min(0, min);
        max = Math.max(0, max);
      } else if (kind === 'percent') {
        min = 0;
        max = 100;
      }
      if (max === min) {
        max += 1;
        min -= 1;
      }
      const bucketCount = Math.max(2, Number(payload.bucket_count) || 288);
      const xFor = (p) => pad.left + (Math.max(0, Math.min(bucketCount - 1, Number(p.i) || 0)) / (bucketCount - 1)) * plotW;
      const yFor = (value) => pad.top + ((max - value) / (max - min)) * plotH;
      const d = points.map((p, idx) => `${idx ? 'L' : 'M'}${xFor(p).toFixed(1)},${yFor(Number(p.value)).toFixed(1)}`).join(' ');
      const zeroY = kind === 'power' && min < 0 && max > 0 ? yFor(0) : null;
      const stroke = kind === 'percent' ? '#2dd4bf' : kind === 'voltage' ? '#a78bfa' : '#38bdf8';
      const circles = points
        .filter((_, idx) => idx % Math.max(1, Math.ceil(points.length / 70)) === 0)
        .map((p) => `<circle cx="${xFor(p).toFixed(1)}" cy="${yFor(Number(p.value)).toFixed(1)}" r="2.6" fill="${stroke}"><title>${p.label}: ${formatMetricValue(p.value, payload.unit, payload.kind)}</title></circle>`)
        .join('');
      const yTicks = [max, (max + min) / 2, min].map((v) => {
        const y = yFor(v);
        return `<g><line x1="${pad.left}" y1="${y.toFixed(1)}" x2="${width - pad.right}" y2="${y.toFixed(1)}" stroke="rgba(148,163,184,.16)"/><text x="${pad.left - 8}" y="${(y + 4).toFixed(1)}" text-anchor="end" fill="#94a3b8" font-size="11">${formatMetricValue(v, payload.unit, payload.kind)}</text></g>`;
      }).join('');
      const xTicks = ['00:00', '06:00', '12:00', '18:00', '24:00'].map((label, idx) => {
        const x = pad.left + (idx / 4) * plotW;
        return `<g><line x1="${x.toFixed(1)}" y1="${pad.top}" x2="${x.toFixed(1)}" y2="${height - pad.bottom}" stroke="rgba(148,163,184,.11)"/><text x="${x.toFixed(1)}" y="${height - 10}" text-anchor="middle" fill="#94a3b8" font-size="11">${label}</text></g>`;
      }).join('');
      return `<svg class="metric-history-chart" viewBox="0 0 ${width} ${height}" role="img" aria-label="${payload.label || 'Storico'}">
        ${xTicks}
        ${yTicks}
        ${zeroY == null ? '' : `<line x1="${pad.left}" y1="${zeroY.toFixed(1)}" x2="${width - pad.right}" y2="${zeroY.toFixed(1)}" stroke="rgba(226,232,240,.45)" stroke-width="1.2"/>`}
        <path d="${d}" fill="none" stroke="${stroke}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
        ${circles}
      </svg>`;
    }

    async function openMetricHistory(metric) {
      const metricKey = String(metric || '').trim();
      if (!metricKey || !metricHistoryModal) return;
      metricHistoryModal.hidden = false;
      metricHistoryTitle.textContent = 'Caricamento storico';
      metricHistorySubtitle.textContent = metricKey;
      metricHistoryBody.innerHTML = '<div class="metric-history-empty">Caricamento dati...</div>';

    function textMetricFromClickPath(path) {
      const chunks = [];
      for (const node of path || []) {
        if (!node || node === host || node === document || node === window) break;
        const raw = String(node.innerText || node.textContent || node.getAttribute?.('aria-label') || node.getAttribute?.('title') || '').trim();
        if (raw && raw.length <= 180) chunks.push(raw.toLowerCase());
      }
      const text = chunks.join(' ');
      if (!text) return '';
      if (/\d+(?:[.,]\d+)?\s*w\b/i.test(text)) return '';
      const isBattery = /batter|bat\.|soc/.test(text);
      const hasPercentValue = /\d+(?:[.,]\d+)?\s*%/.test(text);
      if (isBattery && (hasPercentValue || /\bsoc\b/.test(text))) return 'battery_soc';
      return '';
    }

    function positionMetricFromEvent(event) {
      if (!host) return '';
      const rect = host.getBoundingClientRect();
      if (!rect.width || !rect.height) return '';
      const x = (event.clientX - rect.left) / rect.width;
      const y = (event.clientY - rect.top) / rect.height;
      if (y < 0.34 && x > 0.34 && x < 0.66) return 'pv_power';
      if (x < 0.28 && y > 0.26 && y < 0.72) return 'grid_power';
      if (x > 0.70 && y > 0.25 && y < 0.72) return 'load_power';
      if (y > 0.55 && x > 0.34 && x < 0.66) return 'battery_power';
      return '';
    }

    function installMetricHistoryClicks() {
      document.addEventListener('click', (event) => {
        const path = typeof event.composedPath === 'function' ? event.composedPath() : [];
        if (!path.includes(host)) return;
        const metric = textMetricFromClickPath(path) || positionMetricFromEvent(event);
        if (!metric) return;
        event.preventDefault();
        event.stopPropagation();
        openMetricHistory(metric);
      }, true);
      metricHistoryClose?.addEventListener('click', closeMetricHistory);
      metricHistoryModal?.addEventListener('click', (event) => {
        if (event.target === metricHistoryModal) closeMetricHistory();
      });
      window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') closeMetricHistory();
      });
    }

      const today = new Date().toISOString().slice(0, 10);
      if (energyHistoryPeriod === 'month') energyHistoryDate = energyHistoryInputValue().slice(0, 7) || today.slice(0, 7);
      else if (energyHistoryPeriod === 'year') energyHistoryDate = energyHistoryInputValue().slice(0, 4) || today.slice(0, 4);

    function fitMapMode() {
      if (!MAP_MODE) return;
      if (!energyFrame || !card) return;
      energyFrame.style.transform = 'none';
      energyFrame.style.width = '100vw';
      energyFrame.style.height = '100vh';
      const cw = card.scrollWidth || card.offsetWidth || card.getBoundingClientRect().width || 0;
      const ch = card.scrollHeight || card.offsetHeight || card.getBoundingClientRect().height || 0;
      if (cw <= 0 || ch <= 0) return;
      const scale = Math.min(window.innerWidth / cw, window.innerHeight / ch);
      energyFrame.style.width = `${cw}px`;

      energyFrame.style.transform = `scale(${scale})`;

    // API pubblica richiesta
    window.updateSensors = function updateSensors(newData = {}) {
      const s = window.hass.states;
      const now = new Date().toISOString();
      const set = (id, value, unit, extra = {}) => {
        if (!id) return;
        if (value == null || (typeof value === 'number' && Number.isNaN(value))) return;
        const prev = s[id] || mkState(0, unit);
        s[id] = {
          ...prev,
          state: String(value),
          attributes: {
            ...(prev.attributes || {}),
            unit_of_measurement: unit,
            ...(extra.device_class ? { device_class: extra.device_class } : {}),
            ...(extra.state_class ? { state_class: extra.state_class } : {}),
          },
          last_updated: now,
        };
      };

      if (newData.solar_power != null) {
        const pvTotalId = entityId('pv_total');
        set(pvTotalId, Number(newData.solar_power).toFixed(0), 'W', { device_class: 'power', state_class: 'measurement' });
        // Strict mode: never synthesize PV2+ from total PV.
        if (!pvTotalId) set(entityId('pv1_power_186'), Number(newData.solar_power).toFixed(0), 'W', { device_class: 'power', state_class: 'measurement' });
      }
      if (newData.battery_soc != null) set(entityId('battery_soc_184'), newData.battery_soc, '%', { device_class: 'battery', state_class: 'measurement' });
      if (newData.battery_power != null) set(entityId('battery_power_190'), newData.battery_power, 'W', { device_class: 'power', state_class: 'measurement' });
      if (newData.grid_power != null) {
        set(entityId('grid_power_169'), newData.grid_power, 'W', { device_class: 'power', state_class: 'measurement' });
        set(entityId('grid_ct_power_172'), newData.grid_power, 'W', { device_class: 'power', state_class: 'measurement' });
      }
      if (newData.inverter_power != null) set(entityId('inverter_power_175'), newData.inverter_power, 'W', { device_class: 'power', state_class: 'measurement' });
      if (newData.inverter_voltage != null) set(entityId('inverter_voltage_154'), newData.inverter_voltage, 'V', { device_class: 'voltage', state_class: 'measurement' });
      if (newData.load_frequency != null) set(entityId('load_frequency_192'), newData.load_frequency, 'Hz', { device_class: 'frequency', state_class: 'measurement' });

      forceRender();
    };
