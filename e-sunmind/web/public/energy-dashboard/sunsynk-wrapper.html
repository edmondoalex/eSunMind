    async function syncFromAddonApi() {
      try {
        // Reload options so sign changes in UI are applied without reloading the page.
        const previousLayout = energyDashboardLayout;
        await loadCardConfigFromAddonOptions();
        if (previousLayout !== energyDashboardLayout) {
          window.location.reload();
          return;
        }
        if (card && typeof card.setConfig === 'function') {
          syncEnergyCardstyleClass();
          try {
            if (energyDashboardLayout === 'k_flow') {
              const nextKFlowConfigJson = JSON.stringify(kFlowCardConfig || {});
              if (nextKFlowConfigJson !== lastKFlowConfigJson) {
                lastKFlowConfigJson = nextKFlowConfigJson;
                card.setConfig(kFlowCardConfig);
              }
            } else {
              card.setConfig(prepareCardConfigForSetConfig());
            }
          } catch (e) {
            if (energyDashboardLayout === 'k_flow') {
              console.warn('e-SunMind K Flow setConfig failed', e);
              return;
            }
            sanitizeMissingOptionalEntities();
            try {
              card.setConfig(prepareCardConfigForSetConfig());
            } catch (retryError) {
              console.warn('e-SunMind Energy setConfig failed after sanitize', retryError);
            }
          }
        }
        const dataUrl = SITE_ID ? `../api/data?site=${encodeURIComponent(SITE_ID)}` : '../api/data';
        const r = await fetch(dataUrl, { cache: 'no-store' });
        if (!r.ok) throw new Error(`api_data_http_${r.status}`);
        const j = await r.json();
        updateSunStateFromESunMind(j);
        const energyRoot = j?.energy || {};
        const siteEnergy = selectEnergyDataSnapshot(energyRoot);
        setDashboardSiteName(siteEnergy);
        applyDashboardBackgroundColor(siteEnergy?.dashboard_background_color);
        loadEnergyHistory(false);
        const showSankey = energyDashboardLayout !== 'k_flow' && siteEnergy?.show_sankey !== false && siteEnergy?.sankey_enabled !== false;
        if (!showSankey && sankeySection) sankeySection.hidden = true;
        const n = siteEnergy?.normalized || {};
        const ce = siteEnergy?.card_entities || {};
        const apiEntities = siteEnergy?.entities || {};
        resetInternalMockStates();

        const num = (v) => {
          const x = Number(v);
          return Number.isFinite(x) ? x : null;
        };
        const cardEntry = (cardKey) => {
          const byKey = ce?.[cardKey];
          if (byKey) return byKey;
          const sourceId = String(sourceEntityByCardKey?.[cardKey] || '').trim();
          if (!sourceId) return null;
          return (
            Object.values(ce || {}).find((entry) => String(entry?.entity_id || '').trim() === sourceId) ||
            Object.values(apiEntities || {}).find((entry) => String(entry?.entity_id || '').trim() === sourceId) ||
            null
          );
        };
        const fromCard = (k) => num(cardEntry(k)?.value);
        const pick = (primary, fallback) => {
          const p = num(primary);
          if (p != null) return p;
          const f = num(fallback);
          return f != null ? f : null;
        };
        const applySignByKey = (key, value) => {
          const n = num(value);
          if (n == null) return value;
          return n;
        };
        const publishRawHaEntityState = (entry, fallbackUnit, deviceClass, stateClass) => {
          const id = String(entry?.entity_id || '').trim();
          if (!isConfiguredEntity(id) || entry.value == null) return false;
          const unit = String(entry.unit || fallbackUnit || '');
          const value = num(entry.value) != null ? num(entry.value) : entry.state;
          if (value == null) return false;
          const prev = window.hass.states[id] || mkState(0, unit);
          const attrs = (entry.attributes && typeof entry.attributes === 'object') ? entry.attributes : {};
          window.hass.states[id] = {
            ...prev,
            entity_id: id,
            state: String(value),
            attributes: {
              ...(prev.attributes || {}),
              ...attrs,
              ...(unit ? { unit_of_measurement: unit } : {}),
              ...(deviceClass ? { device_class: deviceClass } : {}),
              ...(stateClass ? { state_class: stateClass } : {}),
            },
            last_updated: new Date().toISOString(),
          };
          return true;
        };
        const publishAllRawCardEntityStates = () => {
          for (const [cardKey, entry] of Object.entries(ce || {})) {
            let unit = '';
            let deviceClass = '';
            let stateClass = '';
            if (cardKey.includes('energy') || cardKey.startsWith('day_')) {
              unit = 'kWh';
              deviceClass = 'energy';
              stateClass = 'total_increasing';
            } else if (cardKey.includes('soc')) {
              unit = '%';
              deviceClass = 'battery';
              stateClass = 'measurement';
            } else if (cardKey.includes('voltage')) {
              unit = 'V';
              deviceClass = 'voltage';
              stateClass = 'measurement';
            } else if (cardKey.includes('current')) {
              unit = 'A';
              deviceClass = 'current';
              stateClass = 'measurement';
            } else if (cardKey.includes('power') || cardKey.includes('load') || cardKey.includes('grid') || cardKey.includes('pv')) {
              unit = 'W';
              deviceClass = 'power';
              stateClass = 'measurement';
            }
            publishRawHaEntityState(entry, unit, deviceClass, stateClass);
          }
        };
        const publishConfiguredExtraSankeyLoads = () => {
          const extraLoads = Array.isArray(siteEnergy?.sankey_extra_loads) ? siteEnergy.sankey_extra_loads.slice(0, 16) : [];
          for (const item of extraLoads) {
            const id = String(item?.entity_id || item?.entity || '').trim();
            if (!isConfiguredEntity(id)) continue;
            const entry =
              Object.values(apiEntities || {}).find((e) => String(e?.entity_id || '').trim() === id) ||
              Object.values(ce || {}).find((e) => String(e?.entity_id || '').trim() === id) ||
              null;
            if (entry && entry.value != null) {
              publishRawHaEntityState(entry, 'W', 'power', 'measurement');
            } else if (!window.hass.states[id]) {
              window.hass.states[id] = mkState(0, 'W', { entity_id: id, device_class: 'power', state_class: 'measurement' });
            }
          }
        };
        const setFromCardEntity = (sensorId, cardKey, fallbackUnit, deviceClass, stateClass) => {
          if (!sensorId) return false;
          const entry = cardEntry(cardKey);
          if (!entry || entry.value == null) return false;
          const raw = entry.value;
          const unit = String(entry.unit || fallbackUnit || '');
          const extra = {};
          if (deviceClass) extra.device_class = deviceClass;
          if (stateClass) extra.state_class = stateClass;
          const value = num(raw) != null ? applySignByKey(cardKey, num(raw)) : raw;
          const prev = window.hass.states[sensorId] || mkState(0, unit);
          window.hass.states[sensorId] = {
            ...prev,
            state: String(value),
            attributes: {
              ...(prev.attributes || {}),
              ...(unit ? { unit_of_measurement: unit } : {}),
              ...extra,
            },
            last_updated: new Date().toISOString(),
          };
          return true;
        };

        publishAllRawCardEntityStates();
        publishConfiguredExtraSankeyLoads();

        const pvTotal = fromCard('pv_total');
        const pv1 = fromCard('pv1_power_186');
        const pv2 = fromCard('pv2_power_187');
        const pv3 = fromCard('pv3_power_188');
        const pv4 = fromCard('pv4_power_189');
        const pv5 = fromCard('pv5_power');
        const pv6 = fromCard('pv6_power');
        const pvStrings = [pv1, pv2, pv3, pv4, pv5, pv6];
        const solarFallback = (pvTotal != null) ? pvTotal : (pvStrings.some((v) => v != null) ? pvStrings.reduce((a, v) => a + Number(v || 0), 0) : null);
        const solarRaw = pick(n.pv_power_w, solarFallback);
        const batteryRaw = pick(n.battery_power_w, fromCard('battery_power_190'));
        const batterySoc = pick(n.battery_soc_pct, fromCard('battery_soc_184'));
        const gridRaw = pick(n.grid_power_w, fromCard('grid_power_169'));
        const inverterRaw = pick(n.home_power_w, fromCard('inverter_power_175'));
        const solarPower = (solarRaw == null ? null : applySignByKey(pvTotal != null ? 'pv_total' : 'pv1_power_186', solarRaw));
        const batteryPower = (batteryRaw == null ? null : applySignByKey('battery_power_190', batteryRaw));
        const gridPower = (gridRaw == null ? null : applySignByKey('grid_power_169', gridRaw));
        const inverterPower = (inverterRaw == null ? null : applySignByKey('inverter_power_175', inverterRaw));

        // campi opzionali: usa valore corrente se non disponibili
        const inverterVoltageRaw = Number(
          siteEnergy?.normalized?.inverter_voltage_v ??
          siteEnergy?.inverter_voltage_v ??
          window.hass.states[entityId('inverter_voltage_154')]?.state ??
          NaN
        );
        const loadFrequencyRaw = Number(
          siteEnergy?.normalized?.load_frequency_hz ??
          siteEnergy?.load_frequency_hz ??
          window.hass.states[entityId('load_frequency_192')]?.state ??
          NaN
        );
        const inverterVoltage = Number.isFinite(inverterVoltageRaw) ? inverterVoltageRaw : null;
        const loadFrequency = Number.isFinite(loadFrequencyRaw) ? loadFrequencyRaw : null;
        window.updateSensors({
          solar_power: solarPower,
          battery_power: batteryPower,
          battery_soc: batterySoc,
          grid_power: gridPower,
          inverter_power: inverterPower,
          inverter_voltage: inverterVoltage,
          load_frequency: loadFrequency,
        });

        // Hard override from raw card entities when available.
        // This keeps the original card fields populated even if normalized mapping is partial.
        setFromCardEntity(entityId('pv_total'), 'pv_total', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('pv1_power_186'), 'pv1_power_186', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('pv2_power_187'), 'pv2_power_187', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('pv3_power_188'), 'pv3_power_188', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('pv4_power_189'), 'pv4_power_189', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('pv5_power'), 'pv5_power', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('pv6_power'), 'pv6_power', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('pv1_voltage_109'), 'pv1_voltage_109', 'V', 'voltage', 'measurement');
        setFromCardEntity(entityId('pv1_current_110'), 'pv1_current_110', 'A', 'current', 'measurement');
        setFromCardEntity(entityId('pv2_voltage_111'), 'pv2_voltage_111', 'V', 'voltage', 'measurement');
        setFromCardEntity(entityId('pv2_current_112'), 'pv2_current_112', 'A', 'current', 'measurement');
        setFromCardEntity(entityId('pv3_voltage_113'), 'pv3_voltage_113', 'V', 'voltage', 'measurement');
        setFromCardEntity(entityId('pv3_current_114'), 'pv3_current_114', 'A', 'current', 'measurement');
        setFromCardEntity(entityId('pv4_voltage_115'), 'pv4_voltage_115', 'V', 'voltage', 'measurement');
        setFromCardEntity(entityId('pv4_current_116'), 'pv4_current_116', 'A', 'current', 'measurement');
        setFromCardEntity(entityId('pv5_voltage'), 'pv5_voltage', 'V', 'voltage', 'measurement');
        setFromCardEntity(entityId('pv5_current'), 'pv5_current', 'A', 'current', 'measurement');
        setFromCardEntity(entityId('pv6_voltage'), 'pv6_voltage', 'V', 'voltage', 'measurement');
        setFromCardEntity(entityId('pv6_current'), 'pv6_current', 'A', 'current', 'measurement');
        setFromCardEntity(entityId('inverter_power_175'), 'inverter_power_175', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('grid_power_169'), 'grid_power_169', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('grid_ct_power_172'), 'grid_ct_power_172', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('battery_soc_184'), 'battery_soc_184', '%', 'battery', 'measurement');
        setFromCardEntity(entityId('battery_power_190'), 'battery_power_190', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('battery_current_191'), 'battery_current_191', 'A', 'current', 'measurement');
        setFromCardEntity(entityId('battery_voltage_183'), 'battery_voltage_183', 'V', 'voltage', 'measurement');
        setFromCardEntity(entityId('inverter_status_59'), 'inverter_status_59', '', '', '');
        setFromCardEntity(entityId('grid_connected_status_194'), 'grid_connected_status_194', '', '', '');
        setFromCardEntity(entityId('day_pv_energy_108'), 'day_pv_energy_108', 'kWh', 'energy', 'total_increasing');
        setFromCardEntity(entityId('day_battery_charge_70'), 'day_battery_charge_70', 'kWh', 'energy', 'total_increasing');
        setFromCardEntity(entityId('day_battery_discharge_71'), 'day_battery_discharge_71', 'kWh', 'energy', 'total_increasing');
        setFromCardEntity(entityId('day_load_energy_84'), 'day_load_energy_84', 'kWh', 'energy', 'total_increasing');
        setFromCardEntity(entityId('day_grid_import_76'), 'day_grid_import_76', 'kWh', 'energy', 'total_increasing');
        setFromCardEntity(entityId('day_grid_export_77'), 'day_grid_export_77', 'kWh', 'energy', 'total_increasing');
        // Load branches (essential/aux/non-essential): keep all mapped nodes live.
        setFromCardEntity(entityId('essential_power'), 'essential_power', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('essential_load1'), 'essential_load1', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('essential_load2'), 'essential_load2', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('essential_load3'), 'essential_load3', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('essential_load4'), 'essential_load4', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('essential_load5'), 'essential_load5', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('essential_load6'), 'essential_load6', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('aux_power_166'), 'aux_power_166', 'W', 'power', 'measurement');
        for (let i = 1; i <= 7; i += 1) {
          setFromCardEntity(entityId(`aux_load${i}`), `aux_load${i}`, 'W', 'power', 'measurement');
        }
        setFromCardEntity(entityId('nonessential_power'), 'nonessential_power', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('non_essential_load1'), 'non_essential_load1', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('non_essential_load2'), 'non_essential_load2', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('non_essential_load3'), 'non_essential_load3', 'W', 'power', 'measurement');

        const setDaily = (id, value) => {
          if (!id) return;
          if (value == null || Number.isNaN(Number(value))) return;
          const prev = window.hass.states[id] || mkState(0, 'kWh', { device_class: 'energy', state_class: 'total_increasing' });
          window.hass.states[id] = {
            ...prev,
            state: String(value),
            attributes: { ...(prev.attributes || {}), unit_of_measurement: 'kWh', device_class: 'energy', state_class: 'total_increasing' },
            last_updated: new Date().toISOString(),
          };
        };
        setDaily(entityId('day_pv_energy_108'), n.pv_energy_today_kwh);
        setDaily(entityId('day_battery_charge_70'), n.battery_charge_today_kwh);
        setDaily(entityId('day_battery_discharge_71'), n.battery_discharge_today_kwh);
        setDaily(entityId('day_load_energy_84'), n.home_energy_today_kwh);
        setDaily(entityId('day_grid_import_76'), n.grid_import_today_kwh);
        setDaily(entityId('day_grid_export_77'), n.grid_export_today_kwh);

        if (showSankey) updateSankeyChart(siteEnergy);
        forceRender();
      } catch (e) {
        const now = Date.now();
        if (now - lastSyncWarnTs > 30000) {
          lastSyncWarnTs = now;
          console.warn('e-SunMind Energy sync failed', e);
        }
      }
    }

    function loadSunsynkCardScript() {
      if (customElements.get('sunsynk-power-flow-card')) return Promise.resolve();
      const urls = [
        './vendor/sunsynk-power-flow-card-v6.9.2.js',
        'https://github.com/slipx06/sunsynk-power-flow-card/releases/download/v6.9.2/sunsynk-power-flow-card.js',
        'https://cdn.jsdelivr.net/gh/slipx06/sunsynk-power-flow-card@v7.3.3/dist/sunsynk-power-flow-card.js',
        'https://cdn.jsdelivr.net/gh/slipx06/sunsynk-power-flow-card@master/dist/sunsynk-power-flow-card.js',
      ];
      return new Promise((resolve, reject) => {
        let idx = 0;
        const tryNext = () => {
          const src = urls[idx++];
          if (!src) {
            reject(new Error('Sunsynk Power Flow Card non caricata da CDN'));
            return;
          }
          const script = document.createElement('script');
          script.type = 'module';
          script.src = src;
          script.onload = () => resolve();
          script.onerror = () => {
            console.warn('e-SunMind Energy CDN failed', src);
            script.remove();
            tryNext();
          };
          document.head.appendChild(script);
        };
        tryNext();
      });
    }

    function loadSankeyChartScript() {
      if (MAP_MODE || customElements.get('sankey-chart')) return Promise.resolve();
      const urls = [
        './vendor/ha-sankey-chart-v5.0.1.js',
        'https://github.com/MindFreeze/ha-sankey-chart/releases/download/v5.0.1/ha-sankey-chart.js',
      ];
      return new Promise((resolve, reject) => {
        let idx = 0;
        const tryNext = () => {
          const src = urls[idx++];
          if (!src) {
            reject(new Error('ha-sankey-chart non caricato'));
            return;
          }
          const script = document.createElement('script');
          script.type = 'module';
          script.src = src;
          script.onload = () => resolve();
          script.onerror = () => {
            console.warn('e-SunMind Sankey CDN failed', src);
            script.remove();
            tryNext();
          };
          document.head.appendChild(script);
        };
        tryNext();
      });
    }

    function loadKFlowCardScript() {
      if (customElements.get('k-flow-card')) return Promise.resolve();
      const urls = [
        `./vendor/k-flow-card.js?v=${encodeURIComponent(ENERGYMIND_WRAPPER_VERSION)}`,
        'https://raw.githubusercontent.com/thekhan1122/k-flow-card/main/dist/k-flow-card.js',
      ];
      return new Promise((resolve, reject) => {
        let idx = 0;
        const tryNext = () => {
          const src = urls[idx++];
          if (!src) {
            reject(new Error('K Flow Card non caricata'));
            return;
          }
          const script = document.createElement('script');
          script.type = 'module';
          script.src = src;
          script.onload = () => resolve();
          script.onerror = () => {
            console.warn('e-SunMind K Flow failed', src);
            script.remove();
            tryNext();
          };
          document.head.appendChild(script);
        };
        tryNext();
      });
    }

    async function startEnergyCard() {
      await loadCardConfigFromAddonOptions();
      try {
        if (energyDashboardLayout === 'k_flow') await loadKFlowCardScript();
        else await loadSunsynkCardScript();
      } catch (e) {
        console.error(e);
        host.innerHTML = '<div style="padding:18px;color:#fecaca;background:#450a0a;border:1px solid #991b1b;border-radius:12px">Errore caricamento layout Energy Flow.</div>';
        return;
      }
      const waitCard = setInterval(async () => {
      const tagReady = energyDashboardLayout === 'k_flow'
        ? customElements.get('k-flow-card')
        : customElements.get('sunsynk-power-flow-card');
      if (tagReady) {
        clearInterval(waitCard);
        initCard();
        if (energyDashboardLayout !== 'k_flow') {
          try {
            await loadSankeyChartScript();
            initSankeyCard();
          } catch (e) {
            console.warn('e-SunMind Sankey disabled', e);
          }
        }
        syncFromAddonApi();
        setInterval(syncFromAddonApi, 2000);
        if (MAP_MODE) {
          setTimeout(fitMapMode, 250);
          setTimeout(fitMapMode, 900);
          window.addEventListener('resize', fitMapMode);
        }
      }
    }, 100);
    }

    // avvio
    startEnergyCard();
  </script>
</body>
