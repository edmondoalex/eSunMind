<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunsynk Wrapper Standalone (Hass Mock)</title>
  <link rel="icon" type="image/svg+xml" href="./energy-favicon.svg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" />
  <style>
    :root {
      --addon-bg: #080a10;
      --primary-background-color: #080a10;
      --card-background-color: #0f172a;
      --primary-text-color: #e2e8f0;
      --secondary-text-color: #94a3b8;
    }
    html, body { margin: 0; background: var(--addon-bg); color: var(--primary-text-color); font-family: Inter, Segoe UI, sans-serif; }
    .page { min-height: 100vh; display: grid; place-items: center; padding: 12px; }
    .energy-frame { position: relative; width: min(1200px, 98vw); }
    .host { width: 100%; }
    .energy-logo-box {
      position: absolute;
      z-index: 4;
      pointer-events: none;
      user-select: none;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .energy-logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      transform-origin: center;
    }
    .energy-logo-top-box .energy-logo { transform: scale(2.08); }
    .energy-logo-bottom-box .energy-logo { transform: scale(2.32); }
    .energy-site-name {
      position: absolute;
      z-index: 5;
      pointer-events: none;
      user-select: none;
      top: clamp(72px, 7.2vw, 90px);
      left: clamp(302px, 30.5%, 378px);
      width: clamp(370px, 36vw, 450px);
      text-align: center;
      color: var(--primary-text-color);
      font-size: clamp(12px, 1.15vw, 16px);
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
      text-shadow: 0 1px 4px rgba(0, 0, 0, .55);
      opacity: .92;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .energy-logo-top-box {
      top: clamp(0px, .25vw, 4px);
      left: clamp(292px, 29.5%, 360px);
      width: clamp(390px, 38vw, 470px);
      height: clamp(92px, 9.2vw, 112px);
      aspect-ratio: auto;
      max-height: none;
    }
    .energy-logo-bottom-box {
      left: clamp(395px, 39.5%, 475px);
      bottom: clamp(6px, 1.8vw, 22px);
      width: clamp(300px, 30vw, 370px);
      height: clamp(96px, 9.8vw, 118px);
      aspect-ratio: auto;
      max-height: none;
    }
    body.energy-card-compact .energy-logo-top-box,
    body.energy-card-lite .energy-logo-top-box {
      left: clamp(205px, 27%, 300px);
      width: clamp(300px, 38vw, 430px);
      height: clamp(78px, 9vw, 100px);
    }
    body.energy-card-compact .energy-logo-bottom-box,
    body.energy-card-lite .energy-logo-bottom-box {
      left: clamp(300px, 39%, 420px);
      width: clamp(240px, 30vw, 330px);
      height: clamp(76px, 9vw, 96px);
    }
    body.energy-card-compact .energy-site-name,
    body.energy-card-lite .energy-site-name {
      top: clamp(60px, 7vw, 76px);
      left: clamp(210px, 27%, 300px);
      width: clamp(290px, 37vw, 420px);
      font-size: clamp(11px, 1.1vw, 14px);
    }
    body.energy-card-minimal .energy-logo-top-box {
      left: clamp(145px, 24%, 245px);
      width: clamp(245px, 36vw, 370px);
      height: clamp(66px, 8.5vw, 86px);
    }
    body.energy-card-minimal .energy-logo-bottom-box {
      left: clamp(235px, 38%, 355px);
      width: clamp(200px, 27vw, 285px);
      height: clamp(60px, 8vw, 76px);
    }
    body.energy-card-minimal .energy-site-name {
      top: clamp(50px, 6.8vw, 68px);
      left: clamp(150px, 24%, 245px);
      width: clamp(235px, 35vw, 360px);
      font-size: clamp(10px, 1vw, 13px);
    }
    html.map-mode, body.map-mode { width: 100vw; height: 100vh; overflow: hidden; }
    body.map-mode .page { min-height: 100vh; height: 100vh; padding: 0; display: block; overflow: hidden; }
    body.map-mode .energy-frame { width: 100vw; height: 100vh; max-width: 100vw; transform-origin: top left; }
    body.map-mode .host { width: 100%; height: 100%; }
    body.map-mode sunsynk-power-flow-card { display: block; }
    @media (max-width: 760px) {
      .energy-logo-top-box {
        top: 6px;
        left: 50%;
        transform: translateX(-50%);
        width: min(92vw, 430px);
        height: min(22vw, 92px);
      }
      .energy-logo-bottom-box {
        left: 50%;
        bottom: 7px;
        transform: translateX(-50%);
        width: min(76vw, 330px);
        height: min(20vw, 82px);
      }
      .energy-site-name {
        top: min(24vw, 96px);
        left: 50%;
        transform: translateX(-50%);
        width: min(86vw, 390px);
        font-size: 12px;
      }
    }
    @media (max-width: 520px) {
      .energy-logo-box { display: none; }
    }
    :root { --grid-tower-size: 64px; }
  </style>
</head>
<body>
  <div class="page">
    <div class="energy-frame" id="energyFrame">
      <div class="energy-logo-box energy-logo-top-box">
        <img class="energy-logo" src="./energymind.png" alt="EnergyMind" />
      </div>
      <div class="energy-site-name" id="energySiteName"></div>
      <div class="energy-logo-box energy-logo-bottom-box">
        <img class="energy-logo" src="./ekonex-original.png" alt="EKONEX" />
      </div>
      <div class="host" id="host"></div>
    </div>
  </div>

  <script>
    // Compat HA custom-card registry: some environments define customCards as non-array.
    if (!Array.isArray(window.customCards)) window.customCards = [];
    // Minimal HA icon shim for standalone mode (required by sunsynk card icons).
    if (!customElements.get('ha-icon')) {
      class HaIcon extends HTMLElement {
        static get observedAttributes() { return ['icon']; }
        connectedCallback() { this.render(); }
        attributeChangedCallback() { this.render(); }
        render() {
          const raw = String(this.getAttribute('icon') || '').trim();
          this.style.removeProperty('width');
          this.style.removeProperty('height');
          this.style.removeProperty('min-width');
          this.style.removeProperty('min-height');
          const name = raw.startsWith('mdi:') ? raw.slice(4) : raw;
          const cls = name ? `mdi mdi-${name}` : 'mdi mdi-help-circle-outline';
          this.innerHTML = `<i class="${cls}" style="font-size:1.35em;line-height:1;color:inherit;"></i>`;
        }
      }
      customElements.define('ha-icon', HaIcon);
    }
  </script>
  <script>
    const QUERY = new URLSearchParams(window.location.search);
    const ENERGYMIND_WRAPPER_VERSION = '0.3.237';
    window.energyMindWrapperVersion = ENERGYMIND_WRAPPER_VERSION;
    const MAP_MODE = QUERY.get('map') === '1';
    const SITE_ID = String(QUERY.get('site') || '').trim();
    const normalizeSiteId = (value) => String(value || '').trim().toLowerCase().replace(/[^a-z0-9_-]+/g, '-').replace(/^-+|-+$/g, '');
    function selectEnergySite(energyRoot) {
      const sites = Array.isArray(energyRoot?.sites) ? energyRoot.sites : [];
      if (!sites.length) return energyRoot || {};
      const wanted = normalizeSiteId(SITE_ID || energyRoot?.selected_site_id || sites[0]?.site_id || sites[0]?.id);
      return sites.find((s) =>
        normalizeSiteId(s?.site_id || s?.id) === wanted ||
        normalizeSiteId(s?.site_name || s?.name) === wanted
      ) || sites[0] || energyRoot || {};
    }
    function selectEnergyDataSnapshot(energyRoot) {
      if (!energyRoot || typeof energyRoot !== 'object') return {};
      if (SITE_ID && normalizeSiteId(energyRoot.site_id || energyRoot.id) === normalizeSiteId(SITE_ID)) {
        return energyRoot;
      }
      return selectEnergySite(energyRoot);
    }
    if (MAP_MODE) {
      document.body.classList.add('map-mode');
      document.documentElement.classList.add('map-mode');
    }

    // Hass Mock globale
    window.hass = {
      language: 'it',
      selectedLanguage: 'it',
      locale: { language: 'it-IT', number_format: 'decimal_comma' },
      themes: { dark: true, default_theme: 'default', themes: {} },
      states: {},
      localize: (key) => String(key || ''),
      callService: () => Promise.resolve(),
      formatEntityState: (s) => String(s?.state ?? ''),
      formatEntityAttributeValue: (_s, _a, v) => String(v ?? ''),
    };

    function mkState(state, unit = '', extra = {}) {
      return {
        entity_id: extra.entity_id || '',
        state: String(state),
        attributes: {
          unit_of_measurement: unit,
          device_class: extra.device_class || '',
          state_class: extra.state_class || '',
        },
        last_changed: new Date().toISOString(),
        last_updated: new Date().toISOString(),
      };
    }

    const sensorIds = {
      inverter_power_175: 'sensor.mock_inverter_power',
      grid_power_169: 'sensor.mock_grid_power',
      battery_soc_184: 'sensor.mock_battery_soc',
      battery_power_190: 'sensor.mock_battery_power',
      battery_current_191: 'sensor.mock_battery_current',
      battery_voltage_183: 'sensor.mock_battery_voltage',
      grid_ct_power_172: 'sensor.mock_grid_ct_power',
      grid_connected_status_194: 'binary_sensor.mock_grid_connected',
      inverter_status_59: 'sensor.mock_inverter_status',
      inverter_voltage_154: 'sensor.mock_inverter_voltage',
      inverter_current_164: 'sensor.mock_inverter_current',
      load_frequency_192: 'sensor.mock_load_frequency',
      pv_total: 'sensor.mock_pv_total',
      pv1_power_186: 'sensor.mock_pv1_power',
      pv2_power_187: 'sensor.mock_pv2_power',
      pv3_power_188: 'sensor.mock_pv3_power',
      pv4_power_189: 'sensor.mock_pv4_power',
      pv5_power: 'sensor.mock_pv5_power',
      pv6_power: 'sensor.mock_pv6_power',
      pv1_voltage_109: 'sensor.mock_pv1_voltage',
      pv1_current_110: 'sensor.mock_pv1_current',
      pv2_voltage_111: 'sensor.mock_pv2_voltage',
      pv2_current_112: 'sensor.mock_pv2_current',
      pv3_voltage_113: 'sensor.mock_pv3_voltage',
      pv3_current_114: 'sensor.mock_pv3_current',
      pv4_voltage_115: 'sensor.mock_pv4_voltage',
      pv4_current_116: 'sensor.mock_pv4_current',
      pv5_voltage: 'sensor.mock_pv5_voltage',
      pv5_current: 'sensor.mock_pv5_current',
      pv6_voltage: 'sensor.mock_pv6_voltage',
      pv6_current: 'sensor.mock_pv6_current',
      day_pv_energy_108: 'sensor.mock_day_pv_energy',
      day_battery_charge_70: 'sensor.mock_day_battery_charge',
      day_battery_discharge_71: 'sensor.mock_day_battery_discharge',
      day_load_energy_84: 'sensor.mock_day_load_energy',
      day_grid_import_76: 'sensor.mock_day_grid_import',
      day_grid_export_77: 'sensor.mock_day_grid_export',
    };
    const sourceEntityByCardKey = {};

    function createBaseCardConfig() {
      return {
        type: 'custom:sunsynk-power-flow-card',
        cardstyle: 'full',
        show_solar: true,
        show_battery: true,
        show_grid: true,
        dynamic_line_width: true,
        min_line_width: 1,
        max_line_width: 4,
        wide: false,
        inverter: { modern: true, auto_scale: true, three_phase: false },
        solar: { mppts: 2, show_daily: true, animation_speed: 6, max_power: 7000 },
        battery: { energy: 15960, shutdown_soc: 20, show_daily: true, animation_speed: 8, max_power: 5000, auto_scale: true },
        load: { show_daily: true, show_aux: false, animation_speed: 6, max_power: 9000, auto_scale: true },
        grid: { show_daily_buy: true, animation_speed: 9, max_power: 8000, auto_scale: true },
        entities: {},
      };
    }

    let cardConfig = createBaseCardConfig();
    const entitySignMap = {};
    const signOf = (key, fallback = 'positive') => {
      const v = String(entitySignMap[String(key)] || fallback).toLowerCase();
      return v === 'negative' ? 'negative' : 'positive';
    };
    const isConfiguredEntity = (v) => {
      const raw = String(v || '').trim();
      const s = raw.toLowerCase();
      if (!s) return false;
      if (['none', 'null', 'undefined', 'unknown', 'unavailable'].includes(s)) return false;
      // Accept only real HA entity_ids (domain.object_id).
      // This avoids counting accidental labels/placeholders as mapped entities.
      return /^[a-z0-9_]+\.[a-z0-9_]+$/i.test(raw);
    };
    const STRICT_ENTITIES_ONLY = true;
    const entityId = (cardKey) => {
      const configured = cardConfig?.entities?.[cardKey];
      if (isConfiguredEntity(configured)) return String(configured).trim();
      return STRICT_ENTITIES_ONLY ? '' : (sensorIds[cardKey] || '');
    };
    const internalEntityId = (cardKey) => sensorIds[cardKey] || `sensor.mock_${String(cardKey || '').toLowerCase().replace(/[^a-z0-9_]+/g, '_')}`;

    function captureSourceEntities() {
      Object.keys(sourceEntityByCardKey).forEach((k) => delete sourceEntityByCardKey[k]);
      const ents = cardConfig?.entities && typeof cardConfig.entities === 'object' ? cardConfig.entities : {};
      for (const [key, value] of Object.entries(ents)) {
        const id = String(value || '').trim();
        if (!isConfiguredEntity(id)) continue;
        if (id.startsWith('sensor.mock_')) continue;
        sourceEntityByCardKey[String(key)] = id;
      }
    }

    function mirrorConfiguredEntitiesForCard() {
      if (!cardConfig.entities || typeof cardConfig.entities !== 'object') cardConfig.entities = {};
      for (const key of Object.keys(cardConfig.entities)) {
        const current = String(cardConfig.entities[key] || '').trim();
        if (!isConfiguredEntity(current)) continue;
        if (!sourceEntityByCardKey[key] && !current.startsWith('sensor.mock_')) {
          sourceEntityByCardKey[key] = current;
        }
        cardConfig.entities[key] = internalEntityId(key);
      }
    }

    function prepareCardConfigForSetConfig() {
      cardConfig = normalizeConfigForCard(cardConfig);
      enforceTopologyFromConfig();
      applySignFlowOverrides();
      mirrorConfiguredEntitiesForCard();
      seedStates();
      return JSON.parse(JSON.stringify(cardConfig));
    }

    function deepMerge(target, src) {
      if (!src || typeof src !== 'object') return target;
      for (const [k, v] of Object.entries(src)) {
        if (v && typeof v === 'object' && !Array.isArray(v)) {
          if (!target[k] || typeof target[k] !== 'object' || Array.isArray(target[k])) target[k] = {};
          deepMerge(target[k], v);
        } else {
          target[k] = v;
        }
      }
      return target;
    }
    const REQUIRED_ENTITY_KEYS = [
      'inverter_power_175','grid_power_169','grid_ct_power_172','grid_connected_status_194','inverter_status_59',
      'battery_soc_184','battery_power_190','battery_current_191','battery_voltage_183',
      'inverter_voltage_154','inverter_current_164','load_frequency_192',
      'pv_total','pv1_power_186','pv2_power_187','pv3_power_188','pv4_power_189','pv5_power','pv6_power','pv1_voltage_109','pv1_current_110','pv2_voltage_111','pv2_current_112','pv3_voltage_113','pv3_current_114','pv4_voltage_115','pv4_current_116','pv5_voltage','pv5_current','pv6_voltage','pv6_current',
      'day_pv_energy_108','day_battery_charge_70','day_battery_discharge_71','day_load_energy_84','day_grid_import_76','day_grid_export_77',
      'essential_power','nonessential_power','essential_load1','essential_load2','essential_load3','essential_load4','essential_load5','essential_load6','aux_power_166','aux_load1','aux_load2','non_essential_load1','non_essential_load2','non_essential_load3','battery2_power_190'
    ];
    function normalizeConfigForCard(input) {
      const c = (input && typeof input === 'object' && !Array.isArray(input)) ? input : {};
      c.type = String(c.type || 'custom:sunsynk-power-flow-card');
      c.cardstyle = String(c.cardstyle || 'full');
      c.solar = (c.solar && typeof c.solar === 'object' && !Array.isArray(c.solar)) ? c.solar : {};
      c.battery = (c.battery && typeof c.battery === 'object' && !Array.isArray(c.battery)) ? c.battery : {};
      c.battery2 = (c.battery2 && typeof c.battery2 === 'object' && !Array.isArray(c.battery2)) ? c.battery2 : {};
      c.load = (c.load && typeof c.load === 'object' && !Array.isArray(c.load)) ? c.load : {};
      c.grid = (c.grid && typeof c.grid === 'object' && !Array.isArray(c.grid)) ? c.grid : {};
      c.inverter = (c.inverter && typeof c.inverter === 'object' && !Array.isArray(c.inverter)) ? c.inverter : {};
      c.entities = (c.entities && typeof c.entities === 'object' && !Array.isArray(c.entities)) ? c.entities : {};
      for (const k of REQUIRED_ENTITY_KEYS) {
        if (!(k in c.entities)) c.entities[k] = '';
      }
      for (const [k, v] of Object.entries(c.entities)) {
        if (v == null) c.entities[k] = '';
        else c.entities[k] = String(v);
      }
      c.solar.mppts = Number.isFinite(Number(c.solar.mppts)) ? Number(c.solar.mppts) : 1;
      c.battery.energy = Number.isFinite(Number(c.battery.energy)) ? Number(c.battery.energy) : 15960;
      c.battery.shutdown_soc = Number.isFinite(Number(c.battery.shutdown_soc)) ? Number(c.battery.shutdown_soc) : 20;
      c.battery.max_power = Number.isFinite(Number(c.battery.max_power)) ? Number(c.battery.max_power) : 5000;
      c.battery.animation_speed = Number.isFinite(Number(c.battery.animation_speed)) ? Number(c.battery.animation_speed) : 8;
      c.battery.auto_scale = Boolean(c.battery.auto_scale ?? true);
      c.battery.dynamic_colour = Boolean(c.battery.dynamic_colour ?? true);
      c.battery.linear_gradient = Boolean(c.battery.linear_gradient ?? true);
      c.battery.animate = Boolean(c.battery.animate ?? true);
      c.battery2.energy = Number.isFinite(Number(c.battery2.energy)) ? Number(c.battery2.energy) : c.battery.energy;
      c.battery2.shutdown_soc = Number.isFinite(Number(c.battery2.shutdown_soc)) ? Number(c.battery2.shutdown_soc) : c.battery.shutdown_soc;
      c.battery2.max_power = Number.isFinite(Number(c.battery2.max_power)) ? Number(c.battery2.max_power) : c.battery.max_power;
      c.battery2.animation_speed = Number.isFinite(Number(c.battery2.animation_speed)) ? Number(c.battery2.animation_speed) : c.battery.animation_speed;
      c.battery2.auto_scale = Boolean(c.battery2.auto_scale ?? c.battery.auto_scale);
      c.battery2.dynamic_colour = Boolean(c.battery2.dynamic_colour ?? c.battery.dynamic_colour);
      c.battery2.linear_gradient = Boolean(c.battery2.linear_gradient ?? c.battery.linear_gradient);
      c.battery2.animate = Boolean(c.battery2.animate ?? c.battery.animate);
      c.solar.dynamic_colour = Boolean(c.solar.dynamic_colour ?? true);
      c.load.additional_loads = Number.isFinite(Number(c.load.additional_loads)) ? Number(c.load.additional_loads) : 0;
      c.load.dynamic_colour = Boolean(c.load.dynamic_colour ?? true);
      c.load.dynamic_icon = Boolean(c.load.dynamic_icon ?? true);
      c.load.aux_dynamic_colour = Boolean(c.load.aux_dynamic_colour ?? true);
      c.load.off_colour = String(c.load.off_colour || 'grey');
      c.load.aux_off_colour = String(c.load.aux_off_colour || 'grey');
      c.grid.additional_loads = Number.isFinite(Number(c.grid.additional_loads)) ? Number(c.grid.additional_loads) : 0;
      return c;
    }

    function ensureInternalDailyEntities() {
      cardConfig.entities = cardConfig.entities || {};
      if (isConfiguredEntity(sourceEntityByCardKey.day_pv_energy_108) || isConfiguredEntity(cardConfig.entities.day_pv_energy_108)) {
        cardConfig.solar = cardConfig.solar || {};
        cardConfig.solar.show_daily = true;
      }
      if (
        (isConfiguredEntity(sourceEntityByCardKey.day_battery_charge_70) || isConfiguredEntity(cardConfig.entities.day_battery_charge_70)) &&
        (isConfiguredEntity(sourceEntityByCardKey.day_battery_discharge_71) || isConfiguredEntity(cardConfig.entities.day_battery_discharge_71))
      ) {
        cardConfig.battery = cardConfig.battery || {};
        cardConfig.battery.show_daily = true;
      }
      if (isConfiguredEntity(sourceEntityByCardKey.day_load_energy_84) || isConfiguredEntity(cardConfig.entities.day_load_energy_84)) {
        cardConfig.load = cardConfig.load || {};
        cardConfig.load.show_daily = true;
      }
      if (isConfiguredEntity(sourceEntityByCardKey.day_grid_import_76) || isConfiguredEntity(cardConfig.entities.day_grid_import_76)) {
        cardConfig.grid = cardConfig.grid || {};
        cardConfig.grid.show_daily_buy = true;
      }
      if (isConfiguredEntity(sourceEntityByCardKey.day_grid_export_77) || isConfiguredEntity(cardConfig.entities.day_grid_export_77)) {
        cardConfig.grid = cardConfig.grid || {};
        cardConfig.grid.show_daily_sell = true;
      }
      if (cardConfig.solar?.show_daily && !isConfiguredEntity(cardConfig.entities.day_pv_energy_108)) {
        cardConfig.entities.day_pv_energy_108 = sensorIds.day_pv_energy_108;
      }
      if (cardConfig.battery?.show_daily) {
        if (!isConfiguredEntity(cardConfig.entities.day_battery_charge_70)) cardConfig.entities.day_battery_charge_70 = sensorIds.day_battery_charge_70;
        if (!isConfiguredEntity(cardConfig.entities.day_battery_discharge_71)) cardConfig.entities.day_battery_discharge_71 = sensorIds.day_battery_discharge_71;
      }
      if (cardConfig.load?.show_daily && !isConfiguredEntity(cardConfig.entities.day_load_energy_84)) {
        cardConfig.entities.day_load_energy_84 = sensorIds.day_load_energy_84;
      }
      if (cardConfig.grid?.show_daily_buy && !isConfiguredEntity(cardConfig.entities.day_grid_import_76)) {
        cardConfig.entities.day_grid_import_76 = sensorIds.day_grid_import_76;
      }
      if (cardConfig.grid?.show_daily_sell && !isConfiguredEntity(cardConfig.entities.day_grid_export_77)) {
        cardConfig.entities.day_grid_export_77 = sensorIds.day_grid_export_77;
      }
    }

    function applyEnergyEntityFallbacks(e) {
      // Strict mode: no implicit mappings from addon energy_config.
      cardConfig.entities = cardConfig.entities || {};
    }

    function applyDashboardBackgroundColor(value) {
      const raw = String(value || '').trim();
      const color = /^#[0-9a-f]{6}$/i.test(raw) ? raw : '#080a10';
      document.documentElement.style.setProperty('--addon-bg', color);
      document.documentElement.style.setProperty('--primary-background-color', color);
      document.documentElement.style.setProperty('--lovelace-background', color);
      document.documentElement.style.setProperty('--ha-card-background', color);
      document.documentElement.style.backgroundColor = color;
      document.body.style.backgroundColor = color;
      document.querySelector('.page')?.style.setProperty('background', color);
      document.querySelector('.energy-frame')?.style.setProperty('background', color);
    }

    function setDashboardSiteName(site) {
      const el = document.getElementById('energySiteName');
      if (!el) return;
      const label = String(site?.site_name || site?.name || site?.id || site?.site_id || SITE_ID || '').trim();
      el.textContent = label;
      el.style.display = label ? 'block' : 'none';
    }

    function applySignFlowOverrides() {
      cardConfig.solar = cardConfig.solar || {};
      cardConfig.battery = cardConfig.battery || {};
      cardConfig.battery2 = cardConfig.battery2 || {};
      cardConfig.load = cardConfig.load || {};
      cardConfig.grid = cardConfig.grid || {};

      const isNegative = (key) => entitySignMap[String(key)] === 'negative';
      const firstNegative = (keys) => keys.some((key) => isConfiguredEntity(cardConfig.entities?.[key]) && isNegative(key));
      // Keep HA states raw and let the Sunsynk card apply its own inversion
      // flags. Otherwise numbers and animated flow direction can diverge.
      cardConfig.solar.invert_flow = firstNegative(['pv_total', 'pv1_power_186', 'pv2_power_187', 'pv3_power_188', 'pv4_power_189', 'pv5_power', 'pv6_power']);
      cardConfig.battery.invert_flow = isNegative('battery_power_190');
      cardConfig.battery2.invert_flow = isNegative('battery2_power_190');
      cardConfig.load.invert_load = isNegative('inverter_power_175') || isNegative('essential_power');
      cardConfig.load.invert_aux = isNegative('aux_power_166');
      cardConfig.grid.invert_grid = isNegative('grid_power_169') || isNegative('grid_ct_power_172');
    }

    function enforceTopologyFromConfig() {
      if (!cardConfig || typeof cardConfig !== 'object' || Array.isArray(cardConfig)) {
        cardConfig = {};
      }
      if (!cardConfig.entities || typeof cardConfig.entities !== 'object' || Array.isArray(cardConfig.entities)) {
        cardConfig.entities = {};
      }
      cardConfig.solar = cardConfig.solar || {};
      cardConfig.battery = cardConfig.battery || {};
      cardConfig.battery2 = cardConfig.battery2 || {};
      cardConfig.inverter = cardConfig.inverter || {};
      cardConfig.entities = cardConfig.entities || {};
      cardConfig.load = cardConfig.load || {};
      cardConfig.grid = cardConfig.grid || {};
      cardConfig.load.show_aux = Boolean(cardConfig.load.show_aux ?? false);
      cardConfig.grid.show_nonessential = Boolean(cardConfig.grid.show_nonessential ?? false);
      cardConfig.grid.additional_loads = Number.isFinite(Number(cardConfig.grid.additional_loads))
        ? Math.max(0, Math.min(3, Number(cardConfig.grid.additional_loads)))
        : 0;
      cardConfig.show_solar = Boolean(cardConfig.show_solar ?? true);
      cardConfig.show_battery = Boolean(cardConfig.show_battery ?? true);
      cardConfig.show_grid = Boolean(cardConfig.show_grid ?? true);
      cardConfig.dynamic_line_width = Boolean(cardConfig.dynamic_line_width ?? true);
      cardConfig.min_line_width = Number.isFinite(Number(cardConfig.min_line_width)) ? Number(cardConfig.min_line_width) : 1;
      cardConfig.max_line_width = Number.isFinite(Number(cardConfig.max_line_width)) ? Number(cardConfig.max_line_width) : 4;
      cardConfig.wide = Boolean(cardConfig.wide ?? false);
      cardConfig.cardstyle = String(cardConfig.cardstyle || 'full');
      cardConfig.type = String(cardConfig.type || 'custom:sunsynk-power-flow-card');
      // Keep icon values as configured from UI/JSON (including custom mdi:*),
      // only fallback to default when empty.
      for (const k of ['load1_icon', 'load2_icon', 'load3_icon', 'load4_icon', 'load5_icon', 'load6_icon']) {
        cardConfig.load[k] = String(cardConfig.load[k] || 'default').trim() || 'default';
      }
      for (const k of ['nonessential_icon', 'load1_icon', 'load2_icon', 'load3_icon']) {
        cardConfig.grid[k] = String(cardConfig.grid[k] || 'default').trim() || 'default';
      }
      for (const k of ['import_icon', 'export_icon', 'disconnected_icon']) {
        const raw = String(cardConfig.grid[k] || '').trim();
        if (!raw) {
          cardConfig.grid[k] = k === 'import_icon'
            ? 'mdi:transmission-tower-import'
            : k === 'export_icon'
              ? 'mdi:transmission-tower-export'
              : 'mdi:transmission-tower-off';
        } else {
          cardConfig.grid[k] = raw;
        }
      }
      // No synthetic PV channel estimation: show only channels that are explicitly mapped.
      const pvMapped = [
        isConfiguredEntity(cardConfig.entities.pv1_power_186),
        isConfiguredEntity(cardConfig.entities.pv2_power_187),
        isConfiguredEntity(cardConfig.entities.pv3_power_188),
        isConfiguredEntity(cardConfig.entities.pv4_power_189),
        isConfiguredEntity(cardConfig.entities.pv5_power),
        isConfiguredEntity(cardConfig.entities.pv6_power),
      ];
      const mappedCount = pvMapped.filter(Boolean).length;
      cardConfig.solar.mppts = Math.max(1, mappedCount || 1);
      if (!isConfiguredEntity(cardConfig.entities.pv1_voltage_109)) delete cardConfig.entities.pv1_voltage_109;
      if (!isConfiguredEntity(cardConfig.entities.pv1_current_110)) delete cardConfig.entities.pv1_current_110;
      if (!isConfiguredEntity(cardConfig.entities.pv2_voltage_111)) delete cardConfig.entities.pv2_voltage_111;
      if (!isConfiguredEntity(cardConfig.entities.pv2_current_112)) delete cardConfig.entities.pv2_current_112;
      if (!isConfiguredEntity(cardConfig.entities.pv3_voltage_113)) delete cardConfig.entities.pv3_voltage_113;
      if (!isConfiguredEntity(cardConfig.entities.pv3_current_114)) delete cardConfig.entities.pv3_current_114;
      if (!isConfiguredEntity(cardConfig.entities.pv4_voltage_115)) delete cardConfig.entities.pv4_voltage_115;
      if (!isConfiguredEntity(cardConfig.entities.pv4_current_116)) delete cardConfig.entities.pv4_current_116;
      if (!isConfiguredEntity(cardConfig.entities.pv5_voltage)) delete cardConfig.entities.pv5_voltage;
      if (!isConfiguredEntity(cardConfig.entities.pv5_current)) delete cardConfig.entities.pv5_current;
      if (!isConfiguredEntity(cardConfig.entities.pv6_voltage)) delete cardConfig.entities.pv6_voltage;
      if (!isConfiguredEntity(cardConfig.entities.pv6_current)) delete cardConfig.entities.pv6_current;
      if (!pvMapped[1]) {
        delete cardConfig.entities.pv2_power_187;
      }
      if (!pvMapped[2]) {
        delete cardConfig.entities.pv3_power_188;
      }
      if (!pvMapped[3]) {
        delete cardConfig.entities.pv4_power_189;
      }
      if (!pvMapped[4]) {
        delete cardConfig.entities.pv5_power;
      }
      if (!pvMapped[5]) {
        delete cardConfig.entities.pv6_power;
      }
      if (!isConfiguredEntity(cardConfig.entities.battery2_power_190)) {
        cardConfig.battery.count = 1;
        delete cardConfig.entities.battery2_power_190;
      }
      // No synthetic load branches: show only mapped essential/aux/non-essential channels.
      const essentialMapped = [
        isConfiguredEntity(cardConfig.entities.essential_load1),
        isConfiguredEntity(cardConfig.entities.essential_load2),
        isConfiguredEntity(cardConfig.entities.essential_load3),
        isConfiguredEntity(cardConfig.entities.essential_load4),
        isConfiguredEntity(cardConfig.entities.essential_load5),
        isConfiguredEntity(cardConfig.entities.essential_load6),
      ];
      const essentialCount = essentialMapped.filter(Boolean).length;
      const visibleEssentialMapped = [...essentialMapped];
      cardConfig.load.additional_loads = essentialCount;
      if (String(cardConfig.cardstyle || 'full') === 'full') {
        // Sunsynk full-card internally invalidates additional_loads 3-6 when
        // show_aux is true, and invalidates exactly 3 even without AUX. If AUX
        // is requested, keep AUX visible and cap essential load branches to 2.
        if (Boolean(cardConfig.load.show_aux) && essentialCount > 2) {
          cardConfig.load.additional_loads = 2;
          visibleEssentialMapped[2] = false;
          visibleEssentialMapped[3] = false;
          visibleEssentialMapped[4] = false;
          visibleEssentialMapped[5] = false;
        } else if (essentialCount === 3) {
          cardConfig.load.additional_loads = 2;
          visibleEssentialMapped[2] = false;
        }
      }
      if (!visibleEssentialMapped[0]) delete cardConfig.entities.essential_load1;
      if (!visibleEssentialMapped[1]) delete cardConfig.entities.essential_load2;
      if (!visibleEssentialMapped[2]) delete cardConfig.entities.essential_load3;
      if (!visibleEssentialMapped[3]) delete cardConfig.entities.essential_load4;
      if (!visibleEssentialMapped[4]) delete cardConfig.entities.essential_load5;
      if (!visibleEssentialMapped[5]) delete cardConfig.entities.essential_load6;

      const auxMapped = [
        isConfiguredEntity(cardConfig.entities.aux_power_166),
        isConfiguredEntity(cardConfig.entities.aux_load1),
        isConfiguredEntity(cardConfig.entities.aux_load2),
      ];
      cardConfig.load.show_aux = auxMapped.some(Boolean) && Boolean(cardConfig.load.show_aux);
      if (!auxMapped[0]) delete cardConfig.entities.aux_power_166;
      if (!auxMapped[1]) delete cardConfig.entities.aux_load1;
      if (!auxMapped[2]) delete cardConfig.entities.aux_load2;

      const nonEssentialMapped = [
        isConfiguredEntity(cardConfig.entities.non_essential_load1),
        isConfiguredEntity(cardConfig.entities.non_essential_load2),
        isConfiguredEntity(cardConfig.entities.non_essential_load3),
      ];
      const nonEssentialCount = nonEssentialMapped.filter(Boolean).length;
      cardConfig.grid.additional_loads = nonEssentialCount;
      cardConfig.grid.show_nonessential = nonEssentialCount > 0 && Boolean(cardConfig.grid.show_nonessential);
      if (!nonEssentialMapped[0]) delete cardConfig.entities.non_essential_load1;
      if (!nonEssentialMapped[1]) delete cardConfig.entities.non_essential_load2;
      if (!nonEssentialMapped[2]) delete cardConfig.entities.non_essential_load3;
      // If main essential power is not mapped but essential_load1 is mapped,
      // use that mapped entity as the main essential power source.
      if (!isConfiguredEntity(cardConfig.entities.essential_power) && isConfiguredEntity(cardConfig.entities.essential_load1)) {
        cardConfig.entities.essential_power = String(cardConfig.entities.essential_load1);
      }
      const hasPv = Boolean([
        'pv_total',
        'pv1_power_186',
        'pv2_power_187',
        'pv3_power_188',
        'pv4_power_189',
        'pv5_power',
        'pv6_power',
      ].some((k) => isConfiguredEntity(cardConfig.entities?.[k])));
      const hasBattery = Boolean(isConfiguredEntity(cardConfig.entities.battery_power_190) || isConfiguredEntity(cardConfig.entities.battery_soc_184));
      const hasGrid = Boolean(isConfiguredEntity(cardConfig.entities.grid_power_169) || isConfiguredEntity(cardConfig.entities.grid_ct_power_172));
      cardConfig.show_solar = Boolean(cardConfig.show_solar && hasPv);
      cardConfig.show_battery = Boolean(cardConfig.show_battery && hasBattery);
      cardConfig.show_grid = Boolean(cardConfig.show_grid && hasGrid);
      ensureInternalDailyEntities();
      sanitizeMissingOptionalEntities();
    }

    function disableIfMissing(section, flag, requiredKeys) {
      const target = cardConfig?.[section];
      if (!target || typeof target !== 'object') return;
      const keys = Array.isArray(requiredKeys) ? requiredKeys : [requiredKeys];
      const missing = keys.filter((k) => !isConfiguredEntity(cardConfig.entities?.[k]));
      if (!missing.length) return;
      target[flag] = false;
      for (const k of missing) delete cardConfig.entities[k];
    }

    function sanitizeMissingOptionalEntities() {
      cardConfig.entities = cardConfig.entities || {};
      cardConfig.solar = cardConfig.solar || {};
      cardConfig.battery = cardConfig.battery || {};
      cardConfig.battery2 = cardConfig.battery2 || {};
      cardConfig.load = cardConfig.load || {};
      cardConfig.grid = cardConfig.grid || {};

      disableIfMissing('solar', 'show_daily', 'day_pv_energy_108');
      disableIfMissing('battery', 'show_daily', ['day_battery_charge_70', 'day_battery_discharge_71']);
      disableIfMissing('battery2', 'show_daily', ['day_battery_charge_70', 'day_battery_discharge_71']);
      disableIfMissing('load', 'show_daily', 'day_load_energy_84');
      disableIfMissing('load', 'show_daily_aux', 'day_aux_energy');
      disableIfMissing('grid', 'show_daily_buy', 'day_grid_import_76');
      disableIfMissing('grid', 'show_daily_sell', 'day_grid_export_77');

      if (!isConfiguredEntity(cardConfig.entities.grid_connected_status_194)) {
        delete cardConfig.entities.grid_connected_status_194;
      }
      if (!isConfiguredEntity(cardConfig.entities.inverter_status_59)) {
        delete cardConfig.entities.inverter_status_59;
      }
    }

    async function loadCardConfigFromAddonOptions() {
      try {
        const r = await fetch('../api/options', { cache: 'no-store' });
        if (!r.ok) return;
        const j = await r.json();
        const energyRoot = j?.energy || {};
        const e = selectEnergySite(energyRoot);
        setDashboardSiteName(e);
        applyDashboardBackgroundColor(e?.dashboard_background_color);
        try {
          Object.keys(entitySignMap).forEach((k) => delete entitySignMap[k]);
          const rawSigns = String(e?.entity_signs_json || '').trim();
          if (rawSigns) {
            const parsedSigns = JSON.parse(rawSigns);
            if (parsedSigns && typeof parsedSigns === 'object' && !Array.isArray(parsedSigns)) {
              for (const [k, v] of Object.entries(parsedSigns)) {
                const vv = String(v || '').toLowerCase();
                if (vv === 'positive' || vv === 'negative') entitySignMap[String(k)] = vv;
              }
            }
          }
        } catch (_) {}
        applyEnergyEntityFallbacks(e);
        cardConfig = createBaseCardConfig();
        const raw = e?.sunsynk_card_config_json;
        if (raw) {
          const parsed = JSON.parse(String(raw));
          if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
            cardConfig = deepMerge(cardConfig, parsed);
          }
        }
        captureSourceEntities();
        enforceTopologyFromConfig();
        applySignFlowOverrides();
      } catch (_) {
        captureSourceEntities();
        enforceTopologyFromConfig();
        applySignFlowOverrides();
      }
    }

    function seedStates() {
      const now = new Date().toISOString();
      const all = cardConfig?.entities && typeof cardConfig.entities === 'object' ? cardConfig.entities : {};
      for (const v of Object.values(all)) {
        const id = String(v || '').trim();
        if (!isConfiguredEntity(id)) continue;
        if (window.hass.states[id]) continue;
        if (id.startsWith('binary_sensor.')) {
          window.hass.states[id] = {
            entity_id: id,
            state: 'on',
            attributes: { device_class: 'power', state_class: '' },
            last_changed: now,
            last_updated: now,
          };
        } else if (id.includes('status')) {
          window.hass.states[id] = {
            entity_id: id,
            state: 'Normal',
            attributes: {},
            last_changed: now,
            last_updated: now,
          };
        } else {
          window.hass.states[id] = mkState(0, '', { entity_id: id });
        }
      }
    }

    function resetInternalMockStates() {
      const now = new Date().toISOString();
      for (const [key, id] of Object.entries(sensorIds)) {
        if (!isConfiguredEntity(id)) continue;
        let unit = '';
        let deviceClass = '';
        let stateClass = 'measurement';
        if (String(key).startsWith('day_')) {
          unit = 'kWh';
          deviceClass = 'energy';
          stateClass = 'total_increasing';
        } else if (String(key).includes('soc')) {
          unit = '%';
          deviceClass = 'battery';
        } else if (String(key).includes('voltage')) {
          unit = 'V';
          deviceClass = 'voltage';
        } else if (String(key).includes('current')) {
          unit = 'A';
          deviceClass = 'current';
        } else if (String(key).includes('frequency')) {
          unit = 'Hz';
          deviceClass = 'frequency';
        } else {
          unit = 'W';
          deviceClass = 'power';
        }
        window.hass.states[id] = {
          entity_id: id,
          state: '0',
          attributes: { unit_of_measurement: unit, device_class: deviceClass, state_class: stateClass },
          last_changed: window.hass.states[id]?.last_changed || now,
          last_updated: now,
        };
      }
      window.hass.states[sensorIds.grid_connected_status_194] = {
        entity_id: sensorIds.grid_connected_status_194,
        state: 'on',
        attributes: { device_class: 'power' },
        last_changed: window.hass.states[sensorIds.grid_connected_status_194]?.last_changed || now,
        last_updated: now,
      };
      window.hass.states[sensorIds.inverter_status_59] = {
        entity_id: sensorIds.inverter_status_59,
        state: 'Normal',
        attributes: {},
        last_changed: window.hass.states[sensorIds.inverter_status_59]?.last_changed || now,
        last_updated: now,
      };
    }

    const host = document.getElementById('host');
    const energyFrame = document.getElementById('energyFrame');
    let card = null;
    let lastSyncWarnTs = 0;

    function syncEnergyCardstyleClass() {
      const style = String(cardConfig?.cardstyle || 'full').toLowerCase();
      document.body.classList.remove('energy-card-full', 'energy-card-compact', 'energy-card-lite', 'energy-card-minimal');
      document.body.classList.add(`energy-card-${['compact', 'lite', 'minimal'].includes(style) ? style : 'full'}`);
    }

    function forceRender() {
      if (!card) return;
      // nuovo riferimento per trigger update lit
      card.hass = { ...window.hass, states: { ...window.hass.states } };
      if (typeof card.requestUpdate === 'function') card.requestUpdate();
    }

    function initCard() {
      seedStates();
      const runtimeConfig = prepareCardConfigForSetConfig();
      syncEnergyCardstyleClass();
      card = document.createElement('sunsynk-power-flow-card');
      try {
        card.setConfig(runtimeConfig);
      } catch (_) {
        const fallback = normalizeConfigForCard({
          type: 'custom:sunsynk-power-flow-card',
          cardstyle: 'full',
          show_solar: true,
          show_battery: true,
          show_grid: true,
          solar: { mppts: 1 },
          battery: { energy: 15960, shutdown_soc: 20, max_power: 5000, animation_speed: 8, auto_scale: true },
          battery2: { energy: 15960, shutdown_soc: 20, max_power: 5000, animation_speed: 8, auto_scale: true },
          load: {},
          grid: {},
          inverter: {},
          entities: { ...cardConfig.entities },
        });
        cardConfig = fallback;
        card.setConfig(prepareCardConfigForSetConfig());
      }
      host.innerHTML = '';
      host.appendChild(card);
      forceRender();
      if (MAP_MODE) fitMapMode();
    }

    function fitMapMode() {
      if (!MAP_MODE) return;
      if (!energyFrame || !card) return;
      energyFrame.style.transform = 'none';
      energyFrame.style.width = '100vw';
      energyFrame.style.height = '100vh';
      const cw = card.scrollWidth || card.offsetWidth || card.getBoundingClientRect().width || 0;
      const ch = card.scrollHeight || card.offsetHeight || card.getBoundingClientRect().height || 0;
      if (cw <= 0 || ch <= 0) return;
      const scale = Math.min(window.innerWidth / cw, window.innerHeight / ch);
      energyFrame.style.width = `${cw}px`;
      energyFrame.style.height = `${ch}px`;
      energyFrame.style.transform = `scale(${scale})`;
    }

    // API pubblica richiesta
    window.updateSensors = function updateSensors(newData = {}) {
      const s = window.hass.states;
      const now = new Date().toISOString();
      const set = (id, value, unit, extra = {}) => {
        if (!id) return;
        if (value == null || (typeof value === 'number' && Number.isNaN(value))) return;
        const prev = s[id] || mkState(0, unit);
        s[id] = {
          ...prev,
          state: String(value),
          attributes: {
            ...(prev.attributes || {}),
            unit_of_measurement: unit,
            ...(extra.device_class ? { device_class: extra.device_class } : {}),
            ...(extra.state_class ? { state_class: extra.state_class } : {}),
          },
          last_updated: now,
        };
      };

      if (newData.solar_power != null) {
        const pvTotalId = entityId('pv_total');
        set(pvTotalId, Number(newData.solar_power).toFixed(0), 'W', { device_class: 'power', state_class: 'measurement' });
        // Strict mode: never synthesize PV2+ from total PV.
        if (!pvTotalId) set(entityId('pv1_power_186'), Number(newData.solar_power).toFixed(0), 'W', { device_class: 'power', state_class: 'measurement' });
      }
      if (newData.battery_soc != null) set(entityId('battery_soc_184'), newData.battery_soc, '%', { device_class: 'battery', state_class: 'measurement' });
      if (newData.battery_power != null) set(entityId('battery_power_190'), newData.battery_power, 'W', { device_class: 'power', state_class: 'measurement' });
      if (newData.grid_power != null) {
        set(entityId('grid_power_169'), newData.grid_power, 'W', { device_class: 'power', state_class: 'measurement' });
        set(entityId('grid_ct_power_172'), newData.grid_power, 'W', { device_class: 'power', state_class: 'measurement' });
      }
      if (newData.inverter_power != null) set(entityId('inverter_power_175'), newData.inverter_power, 'W', { device_class: 'power', state_class: 'measurement' });
      if (newData.inverter_voltage != null) set(entityId('inverter_voltage_154'), newData.inverter_voltage, 'V', { device_class: 'voltage', state_class: 'measurement' });
      if (newData.load_frequency != null) set(entityId('load_frequency_192'), newData.load_frequency, 'Hz', { device_class: 'frequency', state_class: 'measurement' });

      forceRender();
    };

    function randomTick() {
      const solar = 500 + Math.random() * 6000;
      const batteryP = (Math.random() - 0.55) * 4500;
      const gridP = (Math.random() - 0.45) * 3000;
      const invP = Math.max(100, solar + Math.max(0, batteryP) - Math.max(0, -gridP));
      const soc = Math.max(5, Math.min(98, Number(window.hass.states[sensorIds.battery_soc_184]?.state || 26) + (Math.random() - 0.48) * 2));

      window.updateSensors({
        solar_power: solar,
        battery_power: Math.round(batteryP),
        battery_soc: soc.toFixed(1),
        grid_power: Math.round(gridP),
        inverter_power: Math.round(invP),
        inverter_voltage: (229 + Math.random() * 6).toFixed(1),
        load_frequency: (49.95 + Math.random() * 0.15).toFixed(2),
      });
    }

    async function syncFromAddonApi() {
      try {
        // Reload options so sign changes in UI are applied without reloading the page.
        await loadCardConfigFromAddonOptions();
        if (card && typeof card.setConfig === 'function') {
          const runtimeConfig = prepareCardConfigForSetConfig();
          syncEnergyCardstyleClass();
          try {
            card.setConfig(runtimeConfig);
          } catch (e) {
            sanitizeMissingOptionalEntities();
            try {
              card.setConfig(prepareCardConfigForSetConfig());
            } catch (retryError) {
              console.warn('e-SunMind Energy setConfig failed after sanitize', retryError);
            }
          }
        }
        const dataUrl = SITE_ID ? `../api/data?site=${encodeURIComponent(SITE_ID)}` : '../api/data';
        const r = await fetch(dataUrl, { cache: 'no-store' });
        if (!r.ok) throw new Error(`api_data_http_${r.status}`);
        const j = await r.json();
        const energyRoot = j?.energy || {};
        const siteEnergy = selectEnergyDataSnapshot(energyRoot);
        setDashboardSiteName(siteEnergy);
        applyDashboardBackgroundColor(siteEnergy?.dashboard_background_color);
        const n = siteEnergy?.normalized || {};
        const ce = siteEnergy?.card_entities || {};
        const apiEntities = siteEnergy?.entities || {};
        resetInternalMockStates();

        const num = (v) => {
          const x = Number(v);
          return Number.isFinite(x) ? x : null;
        };
        const cardEntry = (cardKey) => {
          const byKey = ce?.[cardKey];
          if (byKey) return byKey;
          const sourceId = String(sourceEntityByCardKey?.[cardKey] || '').trim();
          if (!sourceId) return null;
          return (
            Object.values(ce || {}).find((entry) => String(entry?.entity_id || '').trim() === sourceId) ||
            Object.values(apiEntities || {}).find((entry) => String(entry?.entity_id || '').trim() === sourceId) ||
            null
          );
        };
        const fromCard = (k) => num(cardEntry(k)?.value);
        const pick = (primary, fallback) => {
          const p = num(primary);
          if (p != null) return p;
          const f = num(fallback);
          return f != null ? f : null;
        };
        const applySignByKey = (key, value) => {
          const n = num(value);
          if (n == null) return value;
          return n;
        };
        const publishRawHaEntityState = (entry, fallbackUnit, deviceClass, stateClass) => {
          const id = String(entry?.entity_id || '').trim();
          if (!isConfiguredEntity(id) || entry.value == null) return false;
          const unit = String(entry.unit || fallbackUnit || '');
          const value = num(entry.value) != null ? num(entry.value) : entry.state;
          if (value == null) return false;
          const prev = window.hass.states[id] || mkState(0, unit);
          const attrs = (entry.attributes && typeof entry.attributes === 'object') ? entry.attributes : {};
          window.hass.states[id] = {
            ...prev,
            entity_id: id,
            state: String(value),
            attributes: {
              ...(prev.attributes || {}),
              ...attrs,
              ...(unit ? { unit_of_measurement: unit } : {}),
              ...(deviceClass ? { device_class: deviceClass } : {}),
              ...(stateClass ? { state_class: stateClass } : {}),
            },
            last_updated: new Date().toISOString(),
          };
          return true;
        };
        const publishAllRawCardEntityStates = () => {
          for (const [cardKey, entry] of Object.entries(ce || {})) {
            let unit = '';
            let deviceClass = '';
            let stateClass = '';
            if (cardKey.includes('energy') || cardKey.startsWith('day_')) {
              unit = 'kWh';
              deviceClass = 'energy';
              stateClass = 'total_increasing';
            } else if (cardKey.includes('soc')) {
              unit = '%';
              deviceClass = 'battery';
              stateClass = 'measurement';
            } else if (cardKey.includes('voltage')) {
              unit = 'V';
              deviceClass = 'voltage';
              stateClass = 'measurement';
            } else if (cardKey.includes('current')) {
              unit = 'A';
              deviceClass = 'current';
              stateClass = 'measurement';
            } else if (cardKey.includes('power') || cardKey.includes('load') || cardKey.includes('grid') || cardKey.includes('pv')) {
              unit = 'W';
              deviceClass = 'power';
              stateClass = 'measurement';
            }
            publishRawHaEntityState(entry, unit, deviceClass, stateClass);
          }
        };
        const setFromCardEntity = (sensorId, cardKey, fallbackUnit, deviceClass, stateClass) => {
          if (!sensorId) return false;
          const entry = cardEntry(cardKey);
          if (!entry || entry.value == null) return false;
          const raw = entry.value;
          const unit = String(entry.unit || fallbackUnit || '');
          const extra = {};
          if (deviceClass) extra.device_class = deviceClass;
          if (stateClass) extra.state_class = stateClass;
          const value = num(raw) != null ? applySignByKey(cardKey, num(raw)) : raw;
          const prev = window.hass.states[sensorId] || mkState(0, unit);
          window.hass.states[sensorId] = {
            ...prev,
            state: String(value),
            attributes: {
              ...(prev.attributes || {}),
              ...(unit ? { unit_of_measurement: unit } : {}),
              ...extra,
            },
            last_updated: new Date().toISOString(),
          };
          return true;
        };

        publishAllRawCardEntityStates();

        const pvTotal = fromCard('pv_total');
        const pv1 = fromCard('pv1_power_186');
        const pv2 = fromCard('pv2_power_187');
        const pv3 = fromCard('pv3_power_188');
        const pv4 = fromCard('pv4_power_189');
        const pv5 = fromCard('pv5_power');
        const pv6 = fromCard('pv6_power');
        const pvStrings = [pv1, pv2, pv3, pv4, pv5, pv6];
        const solarFallback = (pvTotal != null) ? pvTotal : (pvStrings.some((v) => v != null) ? pvStrings.reduce((a, v) => a + Number(v || 0), 0) : null);
        const solarRaw = pick(n.pv_power_w, solarFallback);
        const batteryRaw = pick(n.battery_power_w, fromCard('battery_power_190'));
        const batterySoc = pick(n.battery_soc_pct, fromCard('battery_soc_184'));
        const gridRaw = pick(n.grid_power_w, fromCard('grid_power_169'));
        const inverterRaw = pick(n.home_power_w, fromCard('inverter_power_175'));
        const solarPower = (solarRaw == null ? null : applySignByKey(pvTotal != null ? 'pv_total' : 'pv1_power_186', solarRaw));
        const batteryPower = (batteryRaw == null ? null : applySignByKey('battery_power_190', batteryRaw));
        const gridPower = (gridRaw == null ? null : applySignByKey('grid_power_169', gridRaw));
        const inverterPower = (inverterRaw == null ? null : applySignByKey('inverter_power_175', inverterRaw));

        // campi opzionali: usa valore corrente se non disponibili
        const inverterVoltageRaw = Number(
          siteEnergy?.normalized?.inverter_voltage_v ??
          siteEnergy?.inverter_voltage_v ??
          window.hass.states[entityId('inverter_voltage_154')]?.state ??
          NaN
        );
        const loadFrequencyRaw = Number(
          siteEnergy?.normalized?.load_frequency_hz ??
          siteEnergy?.load_frequency_hz ??
          window.hass.states[entityId('load_frequency_192')]?.state ??
          NaN
        );
        const inverterVoltage = Number.isFinite(inverterVoltageRaw) ? inverterVoltageRaw : null;
        const loadFrequency = Number.isFinite(loadFrequencyRaw) ? loadFrequencyRaw : null;
        window.updateSensors({
          solar_power: solarPower,
          battery_power: batteryPower,
          battery_soc: batterySoc,
          grid_power: gridPower,
          inverter_power: inverterPower,
          inverter_voltage: inverterVoltage,
          load_frequency: loadFrequency,
        });

        // Hard override from raw card entities when available.
        // This keeps the original card fields populated even if normalized mapping is partial.
        setFromCardEntity(entityId('pv_total'), 'pv_total', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('pv1_power_186'), 'pv1_power_186', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('pv2_power_187'), 'pv2_power_187', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('pv3_power_188'), 'pv3_power_188', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('pv4_power_189'), 'pv4_power_189', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('pv5_power'), 'pv5_power', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('pv6_power'), 'pv6_power', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('pv1_voltage_109'), 'pv1_voltage_109', 'V', 'voltage', 'measurement');
        setFromCardEntity(entityId('pv1_current_110'), 'pv1_current_110', 'A', 'current', 'measurement');
        setFromCardEntity(entityId('pv2_voltage_111'), 'pv2_voltage_111', 'V', 'voltage', 'measurement');
        setFromCardEntity(entityId('pv2_current_112'), 'pv2_current_112', 'A', 'current', 'measurement');
        setFromCardEntity(entityId('pv3_voltage_113'), 'pv3_voltage_113', 'V', 'voltage', 'measurement');
        setFromCardEntity(entityId('pv3_current_114'), 'pv3_current_114', 'A', 'current', 'measurement');
        setFromCardEntity(entityId('pv4_voltage_115'), 'pv4_voltage_115', 'V', 'voltage', 'measurement');
        setFromCardEntity(entityId('pv4_current_116'), 'pv4_current_116', 'A', 'current', 'measurement');
        setFromCardEntity(entityId('pv5_voltage'), 'pv5_voltage', 'V', 'voltage', 'measurement');
        setFromCardEntity(entityId('pv5_current'), 'pv5_current', 'A', 'current', 'measurement');
        setFromCardEntity(entityId('pv6_voltage'), 'pv6_voltage', 'V', 'voltage', 'measurement');
        setFromCardEntity(entityId('pv6_current'), 'pv6_current', 'A', 'current', 'measurement');
        setFromCardEntity(entityId('inverter_power_175'), 'inverter_power_175', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('grid_power_169'), 'grid_power_169', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('grid_ct_power_172'), 'grid_ct_power_172', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('battery_soc_184'), 'battery_soc_184', '%', 'battery', 'measurement');
        setFromCardEntity(entityId('battery_power_190'), 'battery_power_190', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('battery_current_191'), 'battery_current_191', 'A', 'current', 'measurement');
        setFromCardEntity(entityId('battery_voltage_183'), 'battery_voltage_183', 'V', 'voltage', 'measurement');
        setFromCardEntity(entityId('inverter_status_59'), 'inverter_status_59', '', '', '');
        setFromCardEntity(entityId('grid_connected_status_194'), 'grid_connected_status_194', '', '', '');
        setFromCardEntity(entityId('day_pv_energy_108'), 'day_pv_energy_108', 'kWh', 'energy', 'total_increasing');
        setFromCardEntity(entityId('day_battery_charge_70'), 'day_battery_charge_70', 'kWh', 'energy', 'total_increasing');
        setFromCardEntity(entityId('day_battery_discharge_71'), 'day_battery_discharge_71', 'kWh', 'energy', 'total_increasing');
        setFromCardEntity(entityId('day_load_energy_84'), 'day_load_energy_84', 'kWh', 'energy', 'total_increasing');
        setFromCardEntity(entityId('day_grid_import_76'), 'day_grid_import_76', 'kWh', 'energy', 'total_increasing');
        setFromCardEntity(entityId('day_grid_export_77'), 'day_grid_export_77', 'kWh', 'energy', 'total_increasing');
        // Load branches (essential/aux/non-essential): keep all mapped nodes live.
        setFromCardEntity(entityId('essential_power'), 'essential_power', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('essential_load1'), 'essential_load1', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('essential_load2'), 'essential_load2', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('essential_load3'), 'essential_load3', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('essential_load4'), 'essential_load4', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('essential_load5'), 'essential_load5', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('essential_load6'), 'essential_load6', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('aux_power_166'), 'aux_power_166', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('aux_load1'), 'aux_load1', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('aux_load2'), 'aux_load2', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('nonessential_power'), 'nonessential_power', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('non_essential_load1'), 'non_essential_load1', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('non_essential_load2'), 'non_essential_load2', 'W', 'power', 'measurement');
        setFromCardEntity(entityId('non_essential_load3'), 'non_essential_load3', 'W', 'power', 'measurement');

        const setDaily = (id, value) => {
          if (!id) return;
          if (value == null || Number.isNaN(Number(value))) return;
          const prev = window.hass.states[id] || mkState(0, 'kWh', { device_class: 'energy', state_class: 'total_increasing' });
          window.hass.states[id] = {
            ...prev,
            state: String(value),
            attributes: { ...(prev.attributes || {}), unit_of_measurement: 'kWh', device_class: 'energy', state_class: 'total_increasing' },
            last_updated: new Date().toISOString(),
          };
        };
        setDaily(entityId('day_pv_energy_108'), n.pv_energy_today_kwh);
        setDaily(entityId('day_battery_charge_70'), n.battery_charge_today_kwh);
        setDaily(entityId('day_battery_discharge_71'), n.battery_discharge_today_kwh);
        setDaily(entityId('day_load_energy_84'), n.home_energy_today_kwh);
        setDaily(entityId('day_grid_import_76'), n.grid_import_today_kwh);
        setDaily(entityId('day_grid_export_77'), n.grid_export_today_kwh);

        forceRender();
      } catch (e) {
        const now = Date.now();
        if (now - lastSyncWarnTs > 30000) {
          lastSyncWarnTs = now;
          console.warn('e-SunMind Energy sync failed', e);
        }
      }
    }

    function loadSunsynkCardScript() {
      if (customElements.get('sunsynk-power-flow-card')) return Promise.resolve();
      const urls = [
        'https://cdn.jsdelivr.net/gh/slipx06/sunsynk-power-flow-card@v7.3.3/dist/sunsynk-power-flow-card.js',
        'https://cdn.jsdelivr.net/gh/slipx06/sunsynk-power-flow-card@master/dist/sunsynk-power-flow-card.js',
      ];
      return new Promise((resolve, reject) => {
        let idx = 0;
        const tryNext = () => {
          const src = urls[idx++];
          if (!src) {
            reject(new Error('Sunsynk Power Flow Card non caricata da CDN'));
            return;
          }
          const script = document.createElement('script');
          script.type = 'module';
          script.src = src;
          script.onload = () => resolve();
          script.onerror = () => {
            console.warn('e-SunMind Energy CDN failed', src);
            script.remove();
            tryNext();
          };
          document.head.appendChild(script);
        };
        tryNext();
      });
    }

    async function startEnergyCard() {
      try {
        await loadSunsynkCardScript();
      } catch (e) {
        console.error(e);
        host.innerHTML = '<div style="padding:18px;color:#fecaca;background:#450a0a;border:1px solid #991b1b;border-radius:12px">Errore caricamento Sunsynk Power Flow Card da CDN.</div>';
        return;
      }
      const waitCard = setInterval(async () => {
      if (customElements.get('sunsynk-power-flow-card')) {
        clearInterval(waitCard);
        await loadCardConfigFromAddonOptions();
        initCard();
        syncFromAddonApi();
        setInterval(syncFromAddonApi, 2000);
        if (MAP_MODE) {
          setTimeout(fitMapMode, 250);
          setTimeout(fitMapMode, 900);
          window.addEventListener('resize', fitMapMode);
        }
      }
    }, 100);
    }

    // avvio
    startEnergyCard();
  </script>
