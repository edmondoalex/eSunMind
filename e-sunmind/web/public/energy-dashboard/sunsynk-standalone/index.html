<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunsynk Full Standalone</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="wrap">
    <div class="card">
      <svg id="sunsynk" viewBox="0 0 720 405" preserveAspectRatio="xMidYMid meet">
        <g id="solar" transform="translate(22,10)">
          <text x="0" y="20" class="lbl">SOLAR</text>
          <text x="0" y="42" class="val solar" id="solar_val">0 W</text>
          <rect x="0" y="54" width="70" height="24" rx="4.5" class="box solar-stroke"></rect>
          <text x="35" y="71" class="small" text-anchor="middle" id="pv1_val">0 W</text>
          <rect x="101" y="54" width="70" height="24" rx="4.5" class="box solar-stroke"></rect>
          <text x="136" y="71" class="small" text-anchor="middle" id="pv2_val">0 W</text>
        </g>

        <g id="inverter" transform="translate(279,250)">
          <rect x="-35" y="-18" width="70" height="30" rx="4.5" class="box inv-stroke"></rect>
          <text x="0" y="2" class="small" text-anchor="middle" id="inv_val">0 W</text>
        </g>

        <g id="battery" transform="translate(24,286)">
          <text x="0" y="0" class="lbl">BATTERY</text>
          <text x="0" y="22" class="val battery" id="bat_val">0 W</text>
          <text x="0" y="40" class="small" id="bat_soc">SOC 0%</text>
        </g>

        <g id="load" transform="translate(540,122)">
          <rect x="-35" y="-18" width="70" height="30" rx="4.5" class="box load-stroke"></rect>
          <text x="0" y="2" class="small" text-anchor="middle" id="load_val">0 W</text>
          <text x="-20" y="44" class="lbl">LOAD</text>
        </g>

        <g id="grid" transform="translate(650,310)">
          <rect x="-35" y="-18" width="70" height="30" rx="4.5" class="box grid-stroke"></rect>
          <text x="0" y="2" class="small" text-anchor="middle" id="grid_val">0 W</text>
          <text x="-14" y="44" class="lbl">GRID</text>
        </g>

        <g id="flows"></g>
      </svg>
    </div>
  </div>
  <script src="./script.js"></script>
</body>
</html>
