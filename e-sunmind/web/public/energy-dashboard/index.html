<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'Rajdhani', 'system-ui', 'sans-serif']

        }
      }

  <style>
    :root {
      --bg: #080a10;
      --solar-main: #f59e0b;
      --solar-sub: #fbbf24;
      --battery: #a855f7;
      --consumo: #e5e7eb;
      --consumo-glow: #94a3b8;
      --grid: #06b6d4;
    }
    html, body { margin: 0; background: var(--bg); color: #e5e7eb; font-family: Inter, Rajdhani, sans-serif; }
    .cyber-bg {
      background:
        radial-gradient(circle at 18% 14%, rgba(245,158,11,0.2), transparent 40%),
        radial-gradient(circle at 80% 78%, rgba(6,182,212,0.16), transparent 45%),
        radial-gradient(circle at 32% 74%, rgba(168,85,247,0.18), transparent 35%),
        radial-gradient(circle at 50% 50%, rgba(2,6,23,0.75), rgba(2,6,23,0.98)),
        #080a10;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }
    .cyber-bg::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle at center, rgba(148,163,184,0.13) 1px, transparent 1px);
      background-size: 34px 34px;
      opacity: .24;
      pointer-events: none;
    }
    .glass {
      background: linear-gradient(160deg, rgba(17,24,39,0.68), rgba(2,6,23,0.55));
      border: 1px solid rgba(148,163,184,0.34);
      box-shadow: inset 0 0 16px rgba(148,163,184,0.1), 0 0 14px rgba(15,23,42,0.8);
      backdrop-filter: blur(12px);
      border-radius: 14px;
    }
    .neon-title { text-shadow: 0 0 14px rgba(226,232,240,.44), 0 0 28px rgba(148,163,184,.32); }
    .neon-solar { color: var(--solar-main); text-shadow: 0 0 12px rgba(245,158,11,.62), 0 0 24px rgba(245,158,11,.4); }
    .neon-battery { color: var(--battery); text-shadow: 0 0 10px rgba(168,85,247,.62), 0 0 24px rgba(168,85,247,.4); }
    .neon-grid { color: #7dd3fc; text-shadow: 0 0 10px rgba(6,182,212,.72), 0 0 28px rgba(6,182,212,.45); }
    .card {
      position: absolute;
      padding: 12px 14px;
      min-width: 112px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.25);
      background: linear-gradient(160deg, rgba(15,23,42,.78), rgba(2,6,23,.63));
      box-shadow: inset 0 0 14px rgba(148,163,184,.09), 0 0 14px rgba(15,23,42,.92);
      backdrop-filter: blur(10px);
    }
    .metric-label { font-size: 12px; letter-spacing: .02em; color: #cbd5e1; opacity: .9; }
    .metric-sub { font-size: 28px; line-height: 1; font-weight: 700; }
    .flow-glow { filter: drop-shadow(0 0 6px currentColor) drop-shadow(0 0 14px currentColor) drop-shadow(0 0 22px currentColor); }
    .small { font-size: 12px; color: #94a3b8; }
    .mono { font-variant-numeric: tabular-nums; }
    .icon-shadow { filter: drop-shadow(0 0 10px rgba(255,255,255,.25)); }
    .dashboard-viewport {
      width: 100%;
      height: 100vh;
      display: grid;
      place-items: center;
      padding: 12px;
      box-sizing: border-box;
    }
    .dashboard-stage {
      width: 1024px;
      height: 680px;
      transform-origin: center center;
      will-change: transform;
    }
    @media (max-width: 640px) {
      .dashboard-viewport { padding: 8px; }
    }
  </style>
</head>
